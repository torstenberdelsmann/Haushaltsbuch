<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Familienfinanzen</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f13;color:#e8e6f0;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:flex-end;z-index:200}
.sheet{background:#1a1a2e;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto}
.panel{background:#1a1a2e;border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.07)}
.lbl{font-size:11px;color:#9ca3af;margin-bottom:5px;margin-top:10px;letter-spacing:1px;display:block}
.inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px;color:#fff;font-size:13px;outline:none}
.btn-primary{width:100%;border:none;color:#fff;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
#loading{position:fixed;inset:0;background:#0f0f13;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;font-size:14px;color:#9ca3af}
#app{display:none}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:40px">&#128176;</div>
  <div>Verbinde mit Firebase...</div>
</div>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
"use strict";

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyB15aAsNolTaEbvjGLZQudmZvID69jePjc",
  authDomain:"haushaltsbuch-ba7ff.firebaseapp.com",
  projectId:"haushaltsbuch-ba7ff",
  storageBucket:"haushaltsbuch-ba7ff.firebasestorage.app",
  messagingSenderId:"902171941871",
  appId:"1:902171941871:web:d349425550f2e47a3af41a"
});
var db = firebase.firestore();
var DOC = db.collection("haushaltsbuch").doc("shared");

// Constants
var MONTHS = ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
var COLORS = ["#4ade80","#60a5fa","#f472b6","#a78bfa","#fb923c","#34d399","#f87171","#fbbf24","#38bdf8","#e879f9","#84cc16","#f97316","#06b6d4","#ec4899","#8b5cf6","#14b8a6"];
var RHYTHMUS = [
  {id:"monatlich",label:"Monatlich",short:"mtl."},
  {id:"woechentlich",label:"Woechentlich",short:"woech."},
  {id:"quartalsweise",label:"Quartalsweise",short:"Quartal"},
  {id:"jaehrlich",label:"Jaehrlich",short:"jaehrl."}
];
var DEFAULT_CATS = [
  {id:"lebensmittel",label:"Lebensmittel",icon:"&#128722;",color:"#4ade80"},
  {id:"miete",label:"Miete/Wohnen",icon:"&#127968;",color:"#60a5fa"},
  {id:"freizeit",label:"Freizeit",icon:"&#127918;",color:"#f472b6"},
  {id:"versicherung",label:"Versicherungen",icon:"&#128737;",color:"#a78bfa"},
  {id:"transport",label:"Auto/Transport",icon:"&#128663;",color:"#fb923c"},
  {id:"urlaub",label:"Urlaub",icon:"&#9992;",color:"#34d399"},
  {id:"gesundheit",label:"Gesundheit",icon:"&#128138;",color:"#f87171"},
  {id:"restaurant",label:"Restaurants",icon:"&#127374;",color:"#fbbf24"}
];
var INCOME_CAT = {id:"einnahmen",label:"Einnahmen",icon:"&#128176;",color:"#86efac"};
var ICONS = ["&#128722;","&#127968;","&#127918;","&#128737;","&#128663;","&#9992;","&#128138;","&#127374;","&#128176;","&#127891;","&#128118;","&#128062;","&#128132;","&#127925;","&#128241;","&#127947;","&#127807;","&#128295;","&#127873;","&#127974;","&#127850;","&#128652;","&#128161;","&#9885;","&#128234;","&#128247;","&#129529;","&#128085;","&#128703;","&#128715;","&#128054;","&#9917;","&#127928;","&#128736;"];

var DEFAULT_STATE = {
  entries:[], fixkosten:[], categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),
  persons:["Gemeinsam","Partner 1","Partner 2"],
  budgets:{lebensmittel:600,miete:1200,freizeit:200,versicherung:150,transport:250,urlaub:300,gesundheit:100,restaurant:150},
  lastBackup:null
};

// App state
var S = {
  data: JSON.parse(JSON.stringify(DEFAULT_STATE)),
  tab:"dashboard", fMonth:new Date().getMonth(), fYear:new Date().getFullYear(),
  modal:null, editCat:null, editFix:null, delCat:null, expModal:null,
  ausFilt:"alle", fbStatus:"connecting", scanMsg:"", copied:false, viewPhoto:null,
  form:{type:"ausgabe",catId:"lebensmittel",amount:"",person:"Gemeinsam",note:"",date:tod(),fixRhythmus:"monatlich",photo:null},
  catEd:{label:"",icon:"&#127891;",color:"#60a5fa"},
  fixEd:{label:"",amount:"",rhythmus:"monatlich",catId:"lebensmittel",startDate:tod()}
};

function tod(){return new Date().toISOString().slice(0,10);}
function eur(n){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0);}
function gid(){return "x"+Date.now()+Math.random().toString(36).slice(2,6);}

function fixActive(fix,month){
  if(fix.rhythmus==="monatlich"||fix.rhythmus==="woechentlich") return true;
  if(fix.rhythmus==="quartalsweise"){var sm=fix.startDate?new Date(fix.startDate).getMonth():0;return(month-sm+12)%3===0;}
  if(fix.rhythmus==="jaehrlich"){return fix.startDate?new Date(fix.startDate).getMonth()===month:true;}
  return false;
}
function fixMo(fix){return fix.rhythmus==="woechentlich"?fix.amount*4.33:fix.amount;}
function fixYr(fix){return fix.rhythmus==="monatlich"?fix.amount*12:fix.rhythmus==="woechentlich"?fix.amount*52:fix.rhythmus==="quartalsweise"?fix.amount*4:fix.amount;}
function fixEst(amt,rhy){return rhy==="woechentlich"?amt*4.33:rhy==="quartalsweise"?amt/3:rhy==="jaehrlich"?amt/12:amt;}
function getCat(id){
  var all = S.data.categories.concat([INCOME_CAT]);
  for(var i=0;i<all.length;i++){if(all[i].id===id)return all[i];}
  return S.data.categories[0]||DEFAULT_CATS[0];
}

// Derived
function calc(){
  var d=S.data, fm=S.fMonth, fy=S.fYear;
  var activeFix=d.fixkosten.filter(function(f){return fixActive(f,fm);});
  var totalFix=activeFix.reduce(function(s,f){return s+fixMo(f);},0);
  var mE=d.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===fm&&dt.getFullYear()===fy;});
  var totalInc=mE.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0);
  var totalVar=mE.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
  var totalExp=totalVar+totalFix;
  return {activeFix:activeFix,totalFix:totalFix,mE:mE,totalInc:totalInc,totalVar:totalVar,totalExp:totalExp,balance:totalInc-totalExp};
}
function catExp(id,c){
  var v=c.mE.filter(function(e){return e.category===id&&e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
  var f=c.activeFix.filter(function(f){return f.category===id;}).reduce(function(s,f){return s+fixMo(f);},0);
  return v+f;
}

// Firebase
function getDataToSave(){
  return {entries:S.data.entries,fixkosten:S.data.fixkosten,categories:S.data.categories,persons:S.data.persons,budgets:S.data.budgets,lastBackup:S.data.lastBackup};
}
function saveLocal(){try{localStorage.setItem("hb2",JSON.stringify(getDataToSave()));}catch(e){}}
function loadLocal(){try{var r=localStorage.getItem("hb2");return r?JSON.parse(r):null;}catch(e){return null;}}
function saveFB(){
  var d=getDataToSave();
  d.updatedAt=firebase.firestore.FieldValue.serverTimestamp();
  DOC.set(d).then(function(){S.fbStatus="online";saveLocal();render();}).catch(function(e){console.warn(e);S.fbStatus="offline";render();});
}

// Render
function render(){
  var c=calc();
  document.getElementById("app").innerHTML=buildHTML(c);
  bind(c);
}

function h(str){return String(str).replace(/&(?!#)/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ph(str){return String(str||"");}// passthrough for pre-encoded HTML entities

function buildHTML(c){
  var html="";
  html+=buildHeader(c);
  html+=buildTabs();
  html+=buildBackupBanner(c);
  html+='<div style="padding:13px">';
  if(S.tab==="dashboard") html+=buildDashboard(c);
  if(S.tab==="fixkosten") html+=buildFixkosten(c);
  if(S.tab==="kategorien") html+=buildKategorien(c);
  if(S.tab==="eintraege") html+=buildEintraege(c);
  if(S.tab==="auswertung") html+=buildAuswertung(c);
  if(S.tab==="settings") html+=buildSettings();
  html+='</div>';
  html+=buildFABs();
  html+=buildBottomNav();
  html+=buildModals(c);
  return html;
}

function buildHeader(c){
  var statusColor=S.fbStatus==="online"?"#4ade80":S.fbStatus==="connecting"?"#fbbf24":"#f87171";
  var statusText=S.fbStatus==="online"?"Echtzeit-Sync aktiv":S.fbStatus==="connecting"?"Verbinde...":"Offline";
  var html='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:20px 15px 17px;border-bottom:1px solid rgba(255,255,255,0.07)">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
  html+='<div>';
  html+='<div style="font-size:10px;letter-spacing:3px;color:#9ca3af;text-transform:uppercase;margin-bottom:3px">Haushaltsbuch</div>';
  html+='<div style="font-size:20px;font-weight:700">Familienfinanzen</div>';
  html+='<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px">';
  html+='<div style="width:7px;height:7px;border-radius:99px;background:'+statusColor+'"></div>';
  html+='<span style="color:'+statusColor+'">'+statusText+'</span></div></div>';
  html+='<div style="display:flex;gap:6px">';
  html+='<select id="selM" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">';
  for(var i=0;i<12;i++) html+='<option value="'+i+'"'+(i===S.fMonth?" selected":"")+'>'+MONTHS[i]+'</option>';
  html+='</select>';
  html+='<select id="selY" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">';
  [2024,2025,2026,2027].forEach(function(y){html+='<option value="'+y+'"'+(y===S.fYear?" selected":"")+'>'+y+'</option>';});
  html+='</select></div></div>';
  var cards=[
    {l:"Einnahmen",v:c.totalInc,col:"#4ade80"},
    {l:"Fixkosten",v:c.totalFix,col:"#a78bfa"},
    {l:"Variabel",v:c.totalVar,col:"#f87171"},
    {l:"Bilanz",v:c.balance,col:c.balance>=0?"#60a5fa":"#fb923c"}
  ];
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
  cards.forEach(function(x){
    html+='<div style="background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 6px;border:1px solid '+x.col+'25">';
    html+='<div style="font-size:9px;color:#9ca3af;margin-bottom:2px;letter-spacing:1px">'+x.l.toUpperCase()+'</div>';
    html+='<div style="font-size:12px;font-weight:700;color:'+x.col+'">'+eur(x.v)+'</div></div>';
  });
  html+='</div></div>';
  return html;
}

function buildTabs(){
  var tabs=[["dashboard","Uebersicht"],["fixkosten","Fixkosten"],["kategorien","Kategorien"],["eintraege","Eintraege"],["auswertung","Trend"],["settings","Einst."]];
  var html='<div style="display:flex;background:#1a1a2e;border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto">';
  tabs.forEach(function(t){
    var active=S.tab===t[0];
    html+='<button data-tab="'+t[0]+'" style="flex:0 0 auto;padding:11px 11px;background:none;border:none;border-bottom:2px solid '+(active?"#60a5fa":"transparent")+';color:'+(active?"#60a5fa":"#6b7280")+';font-size:11px;font-weight:'+(active?700:400)+';cursor:pointer;white-space:nowrap">'+t[1]+'</button>';
  });
  html+='</div>';
  return html;
}

function buildBackupBanner(){
  var show=!S.data.lastBackup||(Date.now()-S.data.lastBackup)/86400000>=7;
  if(!show) return "";
  return '<div style="margin:10px 13px 0;background:#1e2d1e;border-radius:10px;padding:10px 12px;border:1px solid rgba(74,222,128,0.2);display:flex;align-items:center;gap:9px">'+
    '<span style="font-size:18px">&#128190;</span>'+
    '<div style="flex:1"><div style="font-size:12px;font-weight:600;color:#4ade80">Woechentliche Sicherung faellig</div></div>'+
    '<button id="btnBk" style="background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer">Backup</button>'+
    '<button id="btnBkX" style="background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer">x</button>'+
    '</div>';
}

function buildDashboard(c){
  var html='';
  // Fix vs Variabel
  html+='<div class="panel" style="margin-bottom:13px">';
  html+='<div style="font-size:12px;font-weight:600;margin-bottom:9px">Fix vs. Variabel - '+MONTHS[S.fMonth]+'</div>';
  html+='<div style="display:flex;gap:7px;margin-bottom:'+(c.totalExp>0?7:0)+'px">';
  html+='<div style="flex:1;background:rgba(167,139,250,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(167,139,250,0.2)">';
  html+='<div style="font-size:10px;color:#9ca3af;margin-bottom:1px">FIXKOSTEN</div>';
  html+='<div style="font-size:14px;font-weight:700;color:#a78bfa">'+eur(c.totalFix)+'</div>';
  html+='<div style="font-size:10px;color:#6b7280">'+(c.totalExp>0?Math.round(c.totalFix/c.totalExp*100):0)+'%</div></div>';
  html+='<div style="flex:1;background:rgba(248,113,113,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(248,113,113,0.2)">';
  html+='<div style="font-size:10px;color:#9ca3af;margin-bottom:1px">VARIABEL</div>';
  html+='<div style="font-size:14px;font-weight:700;color:#f87171">'+eur(c.totalVar)+'</div>';
  html+='<div style="font-size:10px;color:#6b7280">'+(c.totalExp>0?Math.round(c.totalVar/c.totalExp*100):0)+'%</div></div></div>';
  if(c.totalExp>0){
    html+='<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:6px;overflow:hidden;display:flex">';
    html+='<div style="width:'+Math.round(c.totalFix/c.totalExp*100)+'%;height:100%;background:#a78bfa"></div>';
    html+='<div style="width:'+Math.round(c.totalVar/c.totalExp*100)+'%;height:100%;background:#f87171"></div></div>';
  }
  html+='</div>';
  // Budgets
  html+='<div style="font-size:12px;color:#9ca3af;margin-bottom:8px">Budgets - '+MONTHS[S.fMonth]+' '+S.fYear+'</div>';
  S.data.categories.forEach(function(cat){
    var budget=S.data.budgets[cat.id]||0, spent=catExp(cat.id,c), over=budget>0&&spent>budget;
    html+='<div class="panel" style="border:1px solid '+(over?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.07)")+'">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(budget>0?6:0)+'px">';
    html+='<div style="display:flex;align-items:center;gap:7px">';
    html+='<span style="font-size:17px">'+ph(cat.icon)+'</span>';
    html+='<span style="font-size:12px;font-weight:600">'+h(cat.label)+'</span>';
    if(over) html+='<span style="font-size:9px;background:rgba(248,113,113,0.2);color:#f87171;padding:1px 5px;border-radius:20px">UEBERSCHRITTEN</span>';
    html+='</div>';
    html+='<div><span style="font-size:12px;font-weight:700;color:'+(over?"#f87171":"#e8e6f0")+'">'+eur(spent)+'</span>';
    if(budget>0) html+='<span style="font-size:10px;color:#6b7280"> / '+eur(budget)+'</span>';
    html+='</div></div>';
    if(budget>0){
      html+='<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:5px;overflow:hidden">';
      html+='<div style="width:'+Math.min(spent/budget*100,100)+'%;height:100%;background:'+(over?"#f87171":cat.color)+';border-radius:99px"></div></div>';
    }
    html+='</div>';
  });
  return html;
}

function buildFixkosten(c){
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<div><div style="font-size:14px;font-weight:700">Fixkosten</div>';
  html+='<div style="font-size:11px;color:#9ca3af;margin-top:2px">Aktiv '+MONTHS[S.fMonth]+': '+eur(c.totalFix)+'</div></div>';
  html+='<button id="btnNF" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:99px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer">+ Neu</button></div>';
  if(!S.data.fixkosten.length){
    html+='<div style="text-align:center;padding:38px;color:#4b5563"><div style="font-size:34px;margin-bottom:7px">&#128204;</div><div style="font-size:13px">Noch keine Fixkosten</div></div>';
    return html;
  }
  RHYTHMUS.forEach(function(r){
    var items=S.data.fixkosten.filter(function(f){return f.rhythmus===r.id;});
    if(!items.length) return;
    html+='<div style="margin-bottom:15px">';
    html+='<div style="font-size:10px;color:#9ca3af;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between">';
    html+='<span>'+r.label.toUpperCase()+'</span>';
    html+='<span>'+eur(items.reduce(function(s,f){return s+f.amount;},0))+' '+r.short+'</span></div>';
    items.forEach(function(fix){
      var cat=getCat(fix.category), active=fixActive(fix,S.fMonth);
      html+='<div class="panel" style="display:flex;align-items:center;gap:10px;opacity:'+(active?1:0.5)+'">';
      html+='<span style="font-size:18px">'+ph(cat.icon)+'</span>';
      html+='<div style="flex:1"><div style="display:flex;align-items:center;gap:5px">';
      html+='<span style="font-size:12px;font-weight:600">'+h(fix.label)+'</span>';
      if(active) html+='<span style="font-size:9px;background:rgba(74,222,128,0.1);color:#4ade80;padding:1px 4px;border-radius:9px">AKTIV</span>';
      html+='</div><div style="font-size:10px;color:#6b7280">'+h(cat.label)+' - '+r.label+'</div></div>';
      html+='<div style="text-align:right;min-width:60px"><div style="font-size:13px;font-weight:700;color:#f87171">'+eur(fix.amount)+'</div>';
      html+='<div style="font-size:9px;color:#6b7280">'+r.short+'</div></div>';
      html+='<div style="display:flex;flex-direction:column;gap:4px">';
      html+='<button data-ef="'+fix.id+'" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer">&#9998;</button>';
      html+='<button data-df="'+fix.id+'" style="background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);color:#f87171;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer">&#128465;</button>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  // Yearly
  html+='<div style="background:linear-gradient(135deg,#1a1a2e,#1e1a2e);border-radius:12px;padding:12px;border:1px solid rgba(167,139,250,0.2)">';
  html+='<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:#a78bfa">Jahresuebersicht</div>';
  RHYTHMUS.forEach(function(r){
    var items=S.data.fixkosten.filter(function(f){return f.rhythmus===r.id;});
    if(!items.length) return;
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
    html+='<span style="font-size:11px;color:#9ca3af">'+r.label+'</span>';
    html+='<span style="font-size:11px;font-weight:600">'+eur(items.reduce(function(s,f){return s+fixYr(f);},0))+'/Jahr</span></div>';
  });
  html+='<div style="border-top:1px solid rgba(255,255,255,0.07);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between">';
  html+='<span style="font-size:12px;font-weight:600">Gesamt/Jahr</span>';
  html+='<span style="font-size:12px;font-weight:700;color:#a78bfa">'+eur(S.data.fixkosten.reduce(function(s,f){return s+fixYr(f);},0))+'</span></div></div>';
  return html;
}

function buildKategorien(c){

function buildAuswertung(c){
  var yd=MONTHS.map(function(m,i){
    var me=S.data.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===i&&dt.getFullYear()===S.fYear;});
    var fM=S.data.fixkosten.filter(function(f){return fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);
    return {m:m,vr:me.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0),fx:fM,inc:me.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0)};
  });
  var maxY=Math.max.apply(null,yd.map(function(d){return Math.max(d.vr+d.fx,d.inc);}));
  if(maxY<=0) maxY=1;
  var sf=S.ausFilt!=="variabel", sv=S.ausFilt!=="fix";
  var html='<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">Jahrestrend '+S.fYear+'</div>';
  html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  [["alle","Alle"],["fix","Fix"],["variabel","Variabel"]].forEach(function(x){
    var active=S.ausFilt===x[0];
    html+='<button data-af="'+x[0]+'" style="flex:1;background:'+(active?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.05)")+';border:1px solid '+(active?"#3b82f6":"rgba(255,255,255,0.1)")+';color:'+(active?"#60a5fa":"#9ca3af")+';border-radius:9px;padding:7px 3px;font-size:11px;font-weight:'+(active?700:400)+';cursor:pointer">'+x[1]+'</button>';
  });
  html+='</div>';
  html+='<div style="background:#1a1a2e;border-radius:12px;padding:13px;margin-bottom:12px">';
  html+='<div style="display:flex;gap:10px;margin-bottom:10px">';
  if(sf) html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#a78bfa"></div><span style="font-size:10px;color:#9ca3af">Fix</span></div>';
  if(sv) html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#f87171"></div><span style="font-size:10px;color:#9ca3af">Variabel</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#4ade80"></div><span style="font-size:10px;color:#9ca3af">Einnahmen</span></div></div>';
  html+='<div style="display:flex;align-items:flex-end;gap:2px;height:110px">';
  yd.forEach(function(d){
    var tot=(sf?d.fx:0)+(sv?d.vr:0);
    var ih=Math.round(d.inc/maxY*100), th=Math.round(tot/maxY*100);
    var fh=tot>0?Math.round(d.fx/tot*100):0, vh=tot>0?Math.round(d.vr/tot*100):0;
    html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%">';
    html+='<div style="flex:1;width:100%;position:relative">';
    html+='<div style="position:absolute;bottom:0;left:5%;width:42%;height:'+ih+'%;background:#4ade80;border-radius:3px 3px 0 0;min-height:'+(d.inc>0?2:0)+'px"></div>';
    html+='<div style="position:absolute;bottom:0;right:5%;width:42%;height:'+th+'%;border-radius:3px 3px 0 0;overflow:hidden;min-height:'+(tot>0?2:0)+'px;display:flex;flex-direction:column-reverse">';
    if(sv) html+='<div style="width:100%;height:'+vh+'%;background:#f87171;min-height:'+(d.vr>0?2:0)+'px"></div>';
    if(sf) html+='<div style="width:100%;height:'+fh+'%;background:#a78bfa;min-height:'+(d.fx>0?2:0)+'px"></div>';
    html+='</div></div>';
    html+='<div style="font-size:8px;color:#6b7280;margin-top:3px">'+d.m+'</div></div>';
  });
  html+='</div></div>';
  html+='<div class="panel" style="margin-bottom:9px"><div style="font-size:12px;font-weight:600;margin-bottom:8px">'+MONTHS[S.fMonth]+' '+S.fYear+' - Zusammenfassung</div>';
  [{l:"Fixkosten",v:c.totalFix,col:"#a78bfa"},{l:"Variabel",v:c.totalVar,col:"#f87171"},{l:"Gesamt",v:c.totalExp,col:"#e8e6f0"},{l:"Einnahmen",v:c.totalInc,col:"#4ade80"},{l:"Bilanz",v:c.balance,col:c.balance>=0?"#60a5fa":"#fb923c"}].forEach(function(r){
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:11px;color:#9ca3af">'+r.l+'</span><span style="font-size:12px;font-weight:600;color:'+r.col+'">'+eur(r.v)+'</span></div>';
  });
  html+='</div>';
  S.data.persons.forEach(function(p){
    var pe=c.mE.filter(function(e){return e.person===p;});
    var inc=pe.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0);
    var exp=pe.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
    if(!pe.length) return;
    html+='<div class="panel"><div style="font-size:12px;font-weight:600;margin-bottom:6px">'+h(p)+'</div>';
    html+='<div style="display:flex;gap:12px">';
    html+='<div><div style="font-size:9px;color:#9ca3af">Einnahmen</div><div style="font-size:12px;font-weight:600;color:#4ade80">'+eur(inc)+'</div></div>';
    html+='<div><div style="font-size:9px;color:#9ca3af">Variabel</div><div style="font-size:12px;font-weight:600;color:#f87171">'+eur(exp)+'</div></div>';
    html+='<div><div style="font-size:9px;color:#9ca3af">Bilanz</div><div style="font-size:12px;font-weight:600;color:'+(inc-exp>=0?"#60a5fa":"#fb923c")+'">'+eur(inc-exp)+'</div></div>';
    html+='</div></div>';
  });
  return html;
}

// Bind events
function bind(c){
  function on(id,ev,fn){var el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
  function all(sel,fn){document.querySelectorAll(sel).forEach(fn);}

  // Tabs
  all("[data-tab]",function(b){b.addEventListener("click",function(){S.tab=b.dataset.tab;render();});});

  // Month/Year
  on("selM","change",function(){S.fMonth=+document.getElementById("selM").value;render();});
  on("selY","change",function(){S.fYear=+document.getElementById("selY").value;render();});

  // FABs
  on("btnAE","click",function(){S.modal="add";S.scanMsg="";S.form.photo=null;render();});

  // Photo button in modal
  on("btnPhoto","click",function(){document.getElementById("fileInp").click();});
  on("btnRP","click",function(){S.form.photo=null;render();});
  on("fileInp","change",function(e){
    var file=e.target.files[0];if(!file)return;e.target.value="";
    var reader=new FileReader();
    reader.onload=function(){S.form.photo=reader.result;render();};
    reader.readAsDataURL(file);

  // Photo viewer
  all("[data-photo]",function(b){b.addEventListener("click",function(){
    var entry=S.data.entries.find(function(e){return String(e.id)===b.dataset.photo;});
    if(entry&&entry.photo){S.viewPhoto=entry.photo;render();}
  });});
  on("btnCP","click",function(){S.viewPhoto=null;render();});
  on("pvOv","click",function(e){if(e.target.id==="pvOv"){S.viewPhoto=null;render();}});

  // Backup banner
  on("btnBk","click",doBackup);
  on("btnBkX","click",function(){S.data.lastBackup=Date.now();saveFB();render();});

  // Close modal
  on("btnCM","click",function(){S.modal=null;render();});

  all("[data-type]",function(b){b.addEventListener("click",function(){syncForm();S.form.type=b.dataset.type;render();});});

    } else {

    }saveFB();render();
  });

  all("[data-df]",function(b){b.addEventListener("click",function(){S.data.fixkosten=S.data.fixkosten.filter(function(f){return f.id!==b.dataset.df;});saveFB();render();});});

function doCSV(){
  var sep=";",allCats=S.data.categories.concat([INCOME_CAT]);
  var hdr=["Datum","Typ","Kategorie","Person","Betrag","Notiz"].join(sep);
  var eL=S.data.entries.map(function(e){var cat=allCats.find(function(x){return x.id===e.category;});var b=(e.type==="einnahme"?e.amount:-e.amount).toFixed(2).replace(".",",");return[e.date,e.type==="einnahme"?"Einnahme":"Ausgabe",cat?cat.label:e.category,e.person,b,'"'+(e.note||"")+'"'].join(sep);});
  var fL=S.data.fixkosten.map(function(f){var cat=S.data.categories.find(function(x){return x.id===f.category;});var b=(-f.amount).toFixed(2).replace(".",",");var rh=RHYTHMUS.find(function(r){return r.id===f.rhythmus;});return[f.startDate||"","Fixkosten",cat?cat.label:f.category,"-",b,'"'+f.label+' ('+(rh?rh.label:f.rhythmus)+')"'].join(sep);});
  var sH=["Monat","Einnahmen","Variabel","Fixkosten","Gesamt","Bilanz"].join(sep);
  var sL=MONTHS.map(function(m,i){
    var me=S.data.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===i&&dt.getFullYear()===S.fYear;});
    var fM=S.data.fixkosten.filter(function(f){return fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);
    var inc=me.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0);
    var vr=me.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
    return[m+" "+S.fYear,inc.toFixed(2).replace(".",","),vr.toFixed(2).replace(".",","),fM.toFixed(2).replace(".",","),(vr+fM).toFixed(2).replace(".",","),(inc-vr-fM).toFixed(2).replace(".",",")].join(sep);
  });
  var content=[hdr].concat(eL).concat(fL).concat(["","=== MONATSUEBERSICHT ===",sH]).concat(sL).join("\n");
  S.expModal={title:"CSV fuer Excel",content:content,hint:"Kopiere -> Excel oeffnen -> Zelle A1 -> Einfuegen."};render();
}

function handleScan(e){

  S.modal="scan";S.scanMsg="KI analysiert...";render();
  var catIds=S.data.categories.map(function(c){return c.id;}).join(", ");
  var reader=new FileReader();
  reader.onload=function(){
    var base64=reader.result.split(",")[1];
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type,data:base64}},
        {type:"text",text:"Kassenbon analysieren. Extrahiere: Gesamtbetrag, Kategorie (eine aus: "+catIds+"), Datum (YYYY-MM-DD), Haendlername. Antworte NUR als JSON ohne Markdown: {\"amount\":number,\"category\":\"...\",\"date\":\"...\",\"note\":\"...\"}"}
      ]}]})
    }).then(function(res){return res.json();}).then(function(data){
      var text=(data.content||[]).map(function(i){return i.text||"";}).join("");
      var p=JSON.parse(text.replace(/```json|```/g,"").trim());
      var validCat=S.data.categories.find(function(c){return c.id===p.category;});
      S.form.amount=String(p.amount||"");
      S.form.catId=validCat?validCat.id:S.data.categories[0].id;
      S.form.note=p.note||"";
      S.form.date=p.date||tod();
      S.form.type="ausgabe";
      S.scanMsg="Erkannt! Bitte pruefen und speichern.";
      render();
    }).catch(function(err){
      console.warn(err);
      S.scanMsg="Nicht erkannt - bitte manuell eingeben.";
      render();
    });
  };
  reader.readAsDataURL(file);
}

// Boot
var local=loadLocal();
if(local){
  S.data=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),local);
}
S.fbStatus="connecting";
document.getElementById("loading").style.display="flex";
document.getElementById("app").style.display="none";

DOC.onSnapshot(function(snap){
  if(snap.exists){
    var d=snap.data();
    delete d.updatedAt;
    S.data=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),d);
    saveLocal();
  }
  S.fbStatus="online";
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
},function(err){
  console.warn("Firebase:",err);
  S.fbStatus="offline";
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
});
</script>
</body>
