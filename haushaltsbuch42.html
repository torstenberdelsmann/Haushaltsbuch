function fixActive(fix,month){
  if(fix.rhythmus==="monatlich"||fix.rhythmus==="woechentlich")return true;
  if(fix.rhythmus==="quartalsweise"){var sm=fix.startDate?new Date(fix.startDate).getMonth():0;return(month-sm+12)%3===0;}
  if(fix.rhythmus==="jaehrlich"){return fix.startDate?new Date(fix.startDate).getMonth()===month:true;}
  return false;
}
function fixMo(fix){return fix.rhythmus==="woechentlich"?fix.amount*4.33:fix.amount;}
function fixYr(fix){return fix.rhythmus==="monatlich"?fix.amount*12:fix.rhythmus==="woechentlich"?fix.amount*52:fix.rhythmus==="quartalsweise"?fix.amount*4:fix.amount;}
function fixEst(amt,rhy){return rhy==="woechentlich"?amt*4.33:rhy==="quartalsweise"?amt/3:rhy==="jaehrlich"?amt/12:amt;}
function getCat(id){var all=S.data.categories.concat([INCOME_CAT]);for(var i=0;i<all.length;i++){if(all[i].id===id)return all[i];}return S.data.categories[0]||DEFAULT_CATS[0];}

function calc(){
  var d=S.data,fm=S.fMonth,fy=S.fYear;
  var aFix=d.fixkosten.filter(function(f){return fixActive(f,fm);});
  var aFixExp=aFix.filter(function(f){return !f.isIncome;});
  var aFixInc=aFix.filter(function(f){return f.isIncome;});
  var tFix=aFixExp.reduce(function(s,f){return s+fixMo(f);},0);
  var tFixInc=aFixInc.reduce(function(s,f){return s+fixMo(f);},0);
  var mE=d.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===fm&&dt.getFullYear()===fy;});
  var tInc=mE.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){{return s+e.amount;}},0)+tFixInc;
  var tVar=mE.filter(function(e){return e.type==="ausgabe"&&!e.autoBooked;}).reduce(function(s,e){return s+e.amount;},0);
  var tExp=tVar+tFix;
  return{aFix:aFixExp,aFixInc:aFixInc,tFix:tFix,tFixInc:tFixInc,mE:mE,tInc:tInc,tVar:tVar,tExp:tExp,bal:tInc-tExp};
}
function catExp(id,c){
  return c.mE.filter(function(e){return e.category===id&&e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0)+
         c.aFix.filter(function(f){return f.category===id;}).reduce(function(s,f){return s+fixMo(f);},0);
}

    }

});
document.addEventListener("touchstart",function(e){
  if(e.target&&(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")){
    e.target._userTapped=true;
    setTimeout(function(){if(e.target)e.target._userTapped=false;},1000);
  }
},true);

function getBudgetType(catId){return(S.data.budgetTypes&&S.data.budgetTypes[catId])||"monat";}

function getYearSpent(catId,year){
  var entries=S.data.entries.filter(function(e){
    var dt=new Date(e.date);
    return e.category===catId&&e.type==="ausgabe"&&dt.getFullYear()===year;
  });
  var fixSpent=S.data.fixkosten.filter(function(f){return !f.isIncome&&f.category===catId;}).reduce(function(s,f){
    // Count months active this year
    var months=0;
    for(var m=0;m<12;m++){if(fixActive(f,m))months++;}
    return s+fixMo(f)*months;
  },0);
  return entries.reduce(function(s,e){return s+e.amount;},0)+fixSpent;
}

function getBudgetStatus(catId,c){
  var type=getBudgetType(catId);
  var budget=S.data.budgets[catId]||0;
  if(!budget)return null;
  // Is this a Sparen category? If so, invert: over budget = green (more saving = good)
  var isSparKat=(S.data.sparKats||[]).indexOf(catId)>=0;

  if(type==="monat"){
    var spent=catExp(catId,c);
    var pct=Math.min(spent/budget*100,100);
    var over=spent>budget;
    var color;
    if(isSparKat){color=over?"#4ade80":pct>80?"#60a5fa":"#fbbf24";}
    else{color=over?"#f87171":pct>80?"#fbbf24":"#4ade80";}
    return{type:"monat",budget:budget,spent:spent,pct:pct,over:over,overExpected:pct>80,
      color:color,label:eur(spent)+" / "+eur(budget)};
  } else {
    var yearSpent=getYearSpent(catId,S.fYear);
    var monthsElapsed=S.fMonth+1;
    var expectedSoFar=budget/12*monthsElapsed;
    var pctYear=Math.min(yearSpent/budget*100,100);
    var overYear=yearSpent>budget;
    var overExpected=yearSpent>expectedSoFar;
    var color2;
    if(isSparKat){color2=overYear?"#4ade80":overExpected?"#60a5fa":"#fbbf24";}
    else{color2=overYear?"#f87171":overExpected?"#fbbf24":"#4ade80";}
    return{type:"jahr",budget:budget,spent:yearSpent,pct:pctYear,
      over:overYear,overExpected:overExpected,color:color2,
      monthlyBudget:Math.round(budget/12),
      remaining:budget-yearSpent,
      expectedSoFar:expectedSoFar,
      label:eur(yearSpent)+" / "+eur(budget)+" (Jahr)"};
  }
}

function sortFix(fixes){
  var sorted=fixes.slice();
  sorted.sort(function(a,b){
    var r=0;
    if(S.fixSortBy==="alpha")r=a.label.toLowerCase()<b.label.toLowerCase()?-1:1;
    else if(S.fixSortBy==="preis")r=a.amount-b.amount;
    else r=new Date(a.startDate||0)-new Date(b.startDate||0);
    return S.fixSortDir==="desc"?-r:r;
  });
  return sorted;
}

function filterFix(fixes){
  return sortFix(fixes.filter(function(f){
    if(S.fixFilterType!=="alle"&&(f.isIncome?"einnahme":"ausgabe")!==S.fixFilterType)return false;
    if(S.fixFilterPerson!=="alle"&&f.person!==S.fixFilterPerson)return false;
    if(S.fixFilterRhy!=="alle"&&f.rhythmus!==S.fixFilterRhy)return false;
    if(S.fixFilterCat!=="alle"&&f.category!==S.fixFilterCat)return false;

}

function sortEntries(entries){
  var sorted=entries.slice();
  sorted.sort(function(a,b){
    var r=0;
    if(S.sortBy==="datum")r=a.date<b.date?-1:a.date>b.date?1:0;
    else if(S.sortBy==="alpha"){var na=(a.note||getCat(a.category).label).toLowerCase(),nb=(b.note||getCat(b.category).label).toLowerCase();r=na<nb?-1:na>nb?1:0;}
    else if(S.sortBy==="preis")r=a.amount-b.amount;
    return S.sortDir==="desc"?-r:r;
  });
  return sorted;
}

function filterAndSearch(entries){
  return sortEntries(entries.filter(function(e){
    if(S.filterPerson!=="alle"&&e.person!==S.filterPerson)return false;
    if(S.filterType!=="alle"&&e.type!==S.filterType)return false;
    if(S.filterCat!=="alle"&&e.category!==S.filterCat)return false;
    if(S.search){
      var q=S.search.toLowerCase();
      var cat=getCat(e.category);
      var txt=(e.note||"")+" "+(cat.label||"")+" "+e.date+" "+e.person;
      if(txt.toLowerCase().indexOf(q)<0)return false;
    }
    return true;
  }));
}

// ── Auto-book Fixkosten as entries ────────────────────────────────────────
function autoBookFixkosten(month,year){
  var booked=0;
  S.data.fixkosten.forEach(function(fix){
    if(fix.isIncome)return; // skip income
    if(!fixActive(fix,month))return;
    // Check if already booked this month
    var alreadyBooked=S.data.entries.some(function(e){
      return e.autoBookId===fix.id&&new Date(e.date).getMonth()===month&&new Date(e.date).getFullYear()===year;
    });
    if(alreadyBooked)return;
    // Create entry
    var date=year+"-"+String(month+1).padStart(2,"0")+"-01";
    S.data.entries.push({
      id:Date.now()+Math.random(),
      type:"ausgabe",
      category:fix.category||S.data.categories[0].id,
      amount:fixMo(fix),
      person:fix.person||"Gemeinsam",
      note:fix.label+" (automatisch)",
      date:date,
      autoBookId:fix.id,
      autoBooked:true
    });
    booked++;
  });
  if(booked>0){saveData();render();}
  return booked;
}

// ── Month data helper for statistics ─────────────────────────────────────
function getMonthData(month,year){
  var me=S.data.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===month&&dt.getFullYear()===year;});
  var aFix=S.data.fixkosten.filter(function(f){return !f.isIncome&&fixActive(f,month);});
  var aFixInc=S.data.fixkosten.filter(function(f){return f.isIncome&&fixActive(f,month);});
  var tFix=aFix.reduce(function(s,f){return s+fixMo(f);},0);
  var tFixInc=aFixInc.reduce(function(s,f){return s+fixMo(f);},0);
  var tInc=me.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0)+tFixInc;
  var tVar=me.filter(function(e){return e.type==="ausgabe"&&!e.autoBooked;}).reduce(function(s,e){return s+e.amount;},0);
  var catData={};
  S.data.categories.forEach(function(cat){
    var v=me.filter(function(e){return e.category===cat.id&&e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
    var f=aFix.filter(function(x){return x.category===cat.id;}).reduce(function(s,x){return s+fixMo(x);},0);
    catData[cat.id]=v+f;
  });
  return{tFix:tFix,tVar:tVar,tInc:tInc,tExp:tFix+tVar,bal:tInc-tFix-tVar,catData:catData,entries:me};
}

function getYearData(year){
  var tFix=0,tVar=0,tInc=0;
  for(var m=0;m<12;m++){var md=getMonthData(m,year);tFix+=md.tFix;tVar+=md.tVar;tInc+=md.tInc;}
  return{tFix:tFix,tVar:tVar,tInc:tInc,tExp:tFix+tVar,bal:tInc-tFix-tVar};
}

function pct(a,b){if(!b)return null;var p=Math.round((a-b)/b*100);return p;}
function pctLabel(p){if(p===null)return"";return(p>=0?'<span style="color:#4ade80;font-size:10px">+'+p+'%</span>':'<span style="color:#f87171;font-size:10px">'+p+'%</span>');}

function hLogbuch(){
  var log=S.data.log||[];
  var TYPE_LABELS={
    eintrag_neu:"Eintrag erstellt",eintrag_bearbeitet:"Eintrag bearbeitet",eintrag_geloescht:"Eintrag gelöscht",
    fix_neu:"Fixposten erstellt",fix_bearbeitet:"Fixposten bearbeitet",fix_geloescht:"Fixposten gelöscht",
    kategorie_neu:"Kategorie erstellt",kategorie_bearbeitet:"Kategorie bearbeitet",kategorie_geloescht:"Kategorie gelöscht",
    budget_geaendert:"Budget geändert",import:"Import",changelog:"App Update"
  };
  var TYPE_COLORS={
    eintrag_neu:"#4ade80",eintrag_bearbeitet:"#60a5fa",eintrag_geloescht:"#f87171",
    fix_neu:"#4ade80",fix_bearbeitet:"#60a5fa",fix_geloescht:"#f87171",
    kategorie_neu:"#4ade80",kategorie_bearbeitet:"#60a5fa",kategorie_geloescht:"#f87171",
    budget_geaendert:"#fbbf24",import:"#a78bfa",changelog:"#f59e0b"
  };
  // Filter
  var filtered=log.filter(function(l){
    if(S.logFilter!=="alle"&&l.type!==S.logFilter)return false;
    if(S.logPerson!=="alle"&&l.person!==S.logPerson)return false;
    return true;
  });
  // Get unique persons from log
  var logPersons=["alle"];
  log.forEach(function(l){if(l.person&&logPersons.indexOf(l.person)<0)logPersons.push(l.person);});

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<div><div style="font-size:14px;font-weight:700;color:'+T.text+'">&#128214; Logbuch</div>';
  html+='<div style="font-size:11px;color:'+T.subtext+'">'+filtered.length+' von '+log.length+' Einträgen</div></div>';
  html+='<button id="btnClearLog" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:8px;padding:5px 10px;font-size:10px;cursor:pointer">Leeren</button>';
  html+='</div>';

  // Filter bar
  html+=panel(
    // Type filter
    '<div style="margin-bottom:8px"><div style="font-size:10px;color:'+T.subtext+';margin-bottom:5px;letter-spacing:1px">AKTION</div>'+
    '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
    [["alle","Alle"],["eintrag_neu","Neu"],["eintrag_bearbeitet","Bearb."],["eintrag_geloescht","Gelöscht"],["fix_neu","Fix neu"],["budget_geaendert","Budget"],["import","Import"],["changelog","Updates"]].map(function(x){
      var a=S.logFilter===x[0];
      return'<button data-logfilter="'+x[0]+'" style="background:'+(a?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.05)")+';border:1px solid '+(a?T.accent:"rgba(255,255,255,0.1)")+';color:'+(a?T.accent:T.subtext)+';border-radius:7px;padding:4px 8px;font-size:10px;cursor:pointer">'+x[1]+'</button>';
    }).join("")+
    '</div></div>'+
    // Person filter
    '<div><div style="font-size:10px;color:'+T.subtext+';margin-bottom:5px;letter-spacing:1px">PERSON</div>'+
    '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
    logPersons.map(function(p){
      var a=S.logPerson===p;
      return'<button data-logperson="'+h(p)+'" style="background:'+(a?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.05)")+';border:1px solid '+(a?T.accent:"rgba(255,255,255,0.1)")+';color:'+(a?T.accent:T.subtext)+';border-radius:7px;padding:4px 8px;font-size:10px;cursor:pointer">'+(p==="alle"?"Alle":h(p))+'</button>';
    }).join("")+
    '</div></div>'
  );

  if(!log.length){
    html+=panel('<div style="text-align:center;padding:30px;color:#4b5563"><div style="font-size:34px;margin-bottom:8px">&#128214;</div><div>Noch keine Aktivitäten aufgezeichnet.<br>Ab jetzt wird alles gespeichert.</div></div>');
    return html;
  }
  if(!filtered.length){
    html+=panel('<div style="text-align:center;padding:20px;color:#4b5563">Keine Einträge für diesen Filter</div>');
    return html;
  }

  // Group by date
  var grouped={};
  filtered.forEach(function(l){
    var d=new Date(l.ts);
    var key=d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
    if(!grouped[key])grouped[key]=[];
    grouped[key].push(l);
  });

  Object.keys(grouped).forEach(function(date){
    html+='<div style="font-size:10px;color:'+T.subtext+';letter-spacing:1px;margin:12px 0 6px;font-weight:600">'+date+'</div>';
    grouped[date].forEach(function(l){
      var time=new Date(l.ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
      var col=TYPE_COLORS[l.type]||"#9ca3af";
      var icon=LOG_ICONS[l.type]||"&#128203;";
      html+=panel(
        '<div style="display:flex;gap:10px;align-items:flex-start">'+
        '<span style="font-size:18px;flex-shrink:0">'+icon+'</span>'+
        '<div style="flex:1">'+
        '<div style="font-size:12px;font-weight:600;color:'+T.text+'">'+h(l.label)+'</div>'+
        (l.detail?'<div style="font-size:10px;color:'+T.subtext+'">'+h(l.detail)+'</div>':"")+
        '<div style="display:flex;gap:8px;margin-top:3px">'+
        '<span style="font-size:9px;font-weight:600;color:'+col+'">'+h(TYPE_LABELS[l.type]||l.type)+'</span>'+
        '<span style="font-size:9px;color:'+T.subtext+'">'+h(l.person||"")+'</span>'+
        '<span style="font-size:9px;color:'+T.subtext+'">'+time+'</span>'+
        '</div></div></div>',
        "border-left:3px solid "+col+"!important;margin-bottom:6px"
      );
    });
  });

  return html;
}

function hSparpotentiale(){
  var pots=S.data.sparPotentiale||[];
  var trash=S.data.sparPotTrash||[];
  var open=pots.filter(function(p){return !p.done;});
  var done=pots.filter(function(p){return p.done;});

  var PRIOS=[
    {id:"hoch",label:"Hoch",color:"#f87171",icon:"&#128308;"},
    {id:"mittel",label:"Mittel",color:"#fbbf24",icon:"&#128993;"},
    {id:"niedrig",label:"Niedrig",color:"#4ade80",icon:"&#128994;"}
  ];

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<div><div style="font-size:14px;font-weight:700;color:'+T.text+'">&#128176; Sparpotentiale</div>';
  html+='<div style="font-size:11px;color:'+T.subtext+'">'+open.length+' offen, '+done.length+' erledigt</div></div>';
  html+='<div style="display:flex;gap:6px">';
  if(trash.length)html+='<button id="btnShowSparTrash" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer">&#128465; ('+trash.length+')</button>';
  html+='<button id="btnAddSpar" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:8px;padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer">+ Neu</button>';
  html+='</div></div>';

  // Add form
  if(S.sparModal){
    html+=panel(
      '<div style="font-size:11px;font-weight:600;color:'+T.subtext+';margin-bottom:8px;letter-spacing:1px">'+
      (S.editSparId?'BEARBEITEN':'NEUES SPARPOTENZIAL')+'</div>'+
      '<textarea id="sparText" placeholder="Was könnte gespart werden?" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:'+T.text+';border-radius:9px;padding:10px;font-size:12px;min-height:70px;resize:none;margin-bottom:10px;box-sizing:border-box">'+h(S.sparDraft||"")+'</textarea>'+
      '<div style="font-size:10px;color:'+T.subtext+';margin-bottom:6px">PRIORITÄT</div>'+
      '<div style="display:flex;gap:6px;margin-bottom:12px">'+
      PRIOS.map(function(p){var a=S.sparPrio===p.id;return'<button data-sparprio="'+p.id+'" style="flex:1;background:'+(a?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.05)")+';border:1px solid '+(a?T.accent:"rgba(255,255,255,0.1)")+';color:'+(a?T.accent:T.subtext)+';border-radius:8px;padding:7px;font-size:11px;cursor:pointer">'+p.icon+' '+p.label+'</button>';}).join("")+
      '</div>'+
      '<div style="font-size:10px;color:'+T.subtext+';margin-bottom:6px">GESCHÄTZTES SPARPOTENZIAL (EUR/Monat, optional)</div>'+
      '<input id="sparBetrag" type="number" placeholder="z.B. 50" value="'+(S.sparBetrag||"")+'" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:'+T.text+';border-radius:9px;padding:9px;font-size:13px;margin-bottom:12px;box-sizing:border-box"/>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
      '<button id="btnCancelSpar" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:'+T.text+';border-radius:9px;padding:10px;font-size:12px;cursor:pointer">Abbrechen</button>'+
      '<button id="btnSaveSpar" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:9px;padding:10px;font-size:12px;font-weight:600;cursor:pointer">Speichern</button>'+
      '</div>'
    );
  }

  function sparRow(p){
    var prio=PRIOS.find(function(x){return x.id===p.prio;})||PRIOS[1];
    return panel(
      '<div style="display:flex;align-items:flex-start;gap:10px">'+
      '<button data-spartoggle="'+p.id+'" style="width:22px;height:22px;border-radius:50%;border:2px solid '+(p.done?"#4ade80":"rgba(255,255,255,0.2)")+';background:'+(p.done?"#4ade80":"transparent")+';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-top:1px">'+(p.done?'<span style="color:#fff;font-size:11px;pointer-events:none">&#10003;</span>':'')+'</button>'+
      '<div style="flex:1">'+
      '<div style="font-size:12px;font-weight:600;color:'+(p.done?T.subtext:T.text)+';text-decoration:'+(p.done?"line-through":"none")+'">'+h(p.text)+'</div>'+
      (p.betrag?'<div style="font-size:10px;color:#4ade80;margin-top:2px">&#10145; ~'+eur(p.betrag)+'/Monat Sparpotenzial</div>':"")+
      '<div style="display:flex;gap:6px;margin-top:4px;align-items:center">'+
      '<span style="font-size:10px;color:'+prio.color+'">'+prio.icon+' '+prio.label+'</span>'+
      '<span style="font-size:9px;color:'+T.subtext+'">'+new Date(p.ts).toLocaleDateString("de-DE")+'</span>'+
      (p.person?'<span style="font-size:9px;color:'+T.subtext+'">- '+h(p.person)+'</span>':"")+
      '</div></div>'+
      '<div style="display:flex;gap:4px">'+
      '<button data-sparedit="'+p.id+'" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:13px;padding:2px">&#9998;</button>'+
      '<button data-spardel="'+p.id+'" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px;padding:2px">&#128465;</button>'+
      '</div></div>',
      p.done?"opacity:0.6":"border-left:3px solid "+prio.color+"!important"
    );
  }

  if(!pots.length&&!S.sparModal){
    html+=panel('<div style="text-align:center;padding:30px;color:#4b5563"><div style="font-size:34px;margin-bottom:8px">&#128176;</div><div>Noch keine Sparpotenziale.<br>Tippe auf + Neu um eine Idee einzutragen.</div></div>');
  }

  if(open.length){
    html+='<div style="font-size:10px;color:'+T.subtext+';letter-spacing:1px;margin-bottom:8px">OFFEN ('+open.length+')</div>';
    open.forEach(function(p){html+=sparRow(p);});
  }
  if(done.length){
    html+='<div style="font-size:10px;color:'+T.subtext+';letter-spacing:1px;margin:14px 0 8px">ERLEDIGT ('+done.length+')</div>';
    done.forEach(function(p){html+=sparRow(p);});
  }

  // Trash section
  if(S.showSparTrash&&trash.length){
    html+='<div style="border-top:1px solid '+T.cardBorder+';margin:16px 0 10px"></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    html+='<div style="font-size:11px;color:#f87171;font-weight:600">&#128465; Papierkorb ('+trash.length+')</div>';
    html+='<button id="btnEmptySparTrash" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:7px;padding:4px 9px;font-size:10px;cursor:pointer">Leeren</button>';
    html+='</div>';
    trash.forEach(function(p){
      html+=panel(
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div style="flex:1;font-size:12px;color:#6b7280;text-decoration:line-through">'+h(p.text)+'</div>'+
        '<button data-sparrestore="'+p.id+'" style="font-size:10px;color:#4ade80;background:none;border:none;cursor:pointer">&#8617; Wiederherstellen</button>'+
        '</div>'
      );
    });
  }

  return html;
}

// ── Reusable filter bar for detail modals ────────────────────────────────
function hDetailFilter(persons,sortKey,personKey,prefix,cats,catKey){
  var html='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
  // Sort
  html+='<select id="sel'+prefix+'Sort" style="background:rgba(128,128,128,0.15);border:1px solid rgba(255,255,255,0.1);color:'+T.text+';border-radius:7px;padding:5px 8px;font-size:11px;-webkit-tap-highlight-color:rgba(0,0,0,0)">'+
    '<option value="datum_desc" '+(sortKey==="datum_desc"?"selected":"")+'>&#128197; Neueste</option>'+
    '<option value="datum_asc" '+(sortKey==="datum_asc"?"selected":"")+'>&#128197; Älteste</option>'+
    '<option value="betrag_desc" '+(sortKey==="betrag_desc"?"selected":"")+'>&#8595; Betrag</option>'+
    '<option value="betrag_asc" '+(sortKey==="betrag_asc"?"selected":"")+'>&#8593; Betrag</option>'+
    '</select>';
  // Person
  if(persons&&persons.length>1){
    html+='<select id="sel'+prefix+'Per" style="background:rgba(128,128,128,0.15);border:1px solid rgba(255,255,255,0.1);color:'+T.text+';border-radius:7px;padding:5px 8px;font-size:11px;-webkit-tap-highlight-color:rgba(0,0,0,0)">'+
      '<option value="alle">Alle</option>';
    persons.forEach(function(p){html+='<option value="'+h(p)+'" '+(personKey===p?"selected":"")+'>'+h(p)+'</option>';});
    html+='</select>';
  }
  // Optional category filter
  if(cats&&cats.length>1){
    html+='<select id="sel'+prefix+'Cat" style="background:rgba(128,128,128,0.15);border:1px solid rgba(255,255,255,0.1);color:'+T.text+';border-radius:7px;padding:5px 8px;font-size:11px;-webkit-tap-highlight-color:rgba(0,0,0,0)">'+
      '<option value="alle">Alle Kategorien</option>';
    cats.forEach(function(id){var cat=getCat(id);html+='<option value="'+id+'" '+(catKey===id?"selected":"")+'>'+ph(cat.icon)+' '+h(cat.label)+'</option>';});
    html+='</select>';
  }
  html+='</div>';
  return html;
}

function applyDetailSort(entries,sortKey){
  return entries.slice().sort(function(a,b){
    if(sortKey==="datum_asc")return(a.date||"").localeCompare(b.date||"");
    if(sortKey==="betrag_desc")return(b.amount||0)-(a.amount||0);
    if(sortKey==="betrag_asc")return(a.amount||0)-(b.amount||0);
    return(b.date||"").localeCompare(a.date||"");
  });
}

function deleteEntry(id){
  var entry=S.data.entries.find(function(e){return String(e.id)===String(id);});
  if(entry){
    if(!S.data.trash)S.data.trash=[];
    S.data.trash.unshift(Object.assign({},entry,{deletedAt:Date.now()}));
    S.data.entries=S.data.entries.filter(function(e){return String(e.id)!==String(id);});
    addLog("eintrag_geloescht",entry.note||getCat(entry.category).label,eur(entry.amount)+" - "+entry.date);
  }
  // Only reset detail if NOT in a header detail (preserve variabel/einnahmen view)
  if(!S.headerDetail){S.catDetailId=null;}
  saveData();render();
}

function deleteFix(id){
  var fix=S.data.fixkosten.find(function(f){return f.id===id;});
  if(fix){
    if(!S.data.fixTrash)S.data.fixTrash=[];
    S.data.fixTrash.unshift(Object.assign({},fix,{deletedAt:Date.now()}));
    S.data.fixkosten=S.data.fixkosten.filter(function(f){return f.id!==id;});
    addLog("fix_geloescht",fix.label,eur(fix.amount)+" - "+fix.rhythmus);
  }
  S.headerDetail=null;S.catDetailId=null;S.trendDetail=null;saveData();render();
}

function doPDF(){
  var months=[];
  if(!S.pdfRange){
    months.push({month:S.pdfMonth,year:S.pdfYear});
  } else {
    var fy=S.pdfFromYear,fm=S.pdfFromMonth;
    while(fy<S.pdfToYear||(fy===S.pdfToYear&&fm<=S.pdfToMonth)){
      months.push({month:fm,year:fy});
      fm++;if(fm>11){fm=0;fy++;}
      if(months.length>24)break;
    }
  }
  var win=window.open("","_blank");
  if(!win)return;
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Familienfinanzen Export</title><style>';
  html+='body{font-family:Arial,sans-serif;color:#111;max-width:800px;margin:0 auto;padding:20px;font-size:12px}';
  html+='h1{font-size:20px;color:#1e3a5f;margin-bottom:4px}h2{font-size:14px;color:#1e3a5f;margin:16px 0 8px;border-bottom:2px solid #1e3a5f;padding-bottom:4px}';
  html+='table{width:100%;border-collapse:collapse;margin-bottom:16px}th{background:#1e3a5f;color:#fff;padding:6px 8px;text-align:left;font-size:11px}td{padding:5px 8px;border-bottom:1px solid #e5e7eb;font-size:11px}';
  html+='.pos{color:#166534;font-weight:600}.neg{color:#7f1d1d;font-weight:600}.summary{background:#f1f5f9;font-weight:700}';
  html+='@media print{body{padding:10px}}</style></head><body>';
  html+='<h1>&#128176; Familienfinanzen</h1>';
  html+='<p style="color:#6b7280;margin-bottom:20px">Erstellt am '+new Date().toLocaleDateString("de-DE")+'</p>';

  months.forEach(function(mp){
    var md=getMonthData(mp.month,mp.year);
    var allCats=S.data.categories.concat([INCOME_CAT]);
    html+='<h2>'+MONTHS[mp.month]+' '+mp.year+'</h2>';
    // Summary
    html+='<table><tr class="summary"><td>Einnahmen</td><td class="pos">+'+eur(md.tInc)+'</td><td>Fixkosten</td><td class="neg">-'+eur(md.tFix)+'</td><td>Variabel</td><td class="neg">-'+eur(md.tVar)+'</td><td>Bilanz</td><td class="'+(md.bal>=0?"pos":"neg")+'">'+(md.bal>=0?"+":"")+eur(md.bal)+'</td></tr></table>';
    // Entries
    if(md.entries.length){
      html+='<table><thead><tr><th>Datum</th><th>Typ</th><th>Kategorie</th><th>Person</th><th>Betrag</th><th>Notiz</th></tr></thead><tbody>';
      md.entries.forEach(function(e){var cat=allCats.find(function(x){return x.id===e.category;});html+='<tr><td>'+e.date+'</td><td>'+(e.type==="einnahme"?"Einnahme":"Ausgabe")+'</td><td>'+(cat?cat.label:e.category)+'</td><td>'+(e.person||"")+'</td><td class="'+(e.type==="einnahme"?"pos":"neg")+'">'+(e.type==="einnahme"?"+":"-")+eur(e.amount)+'</td><td>'+(e.note||"")+'</td></tr>';});
      html+='</tbody></table>';
    }
    // Fix
    var activeFix=S.data.fixkosten.filter(function(f){return !f.isIncome&&fixActive(f,mp.month);});
    if(activeFix.length){
      html+='<table><thead><tr><th>Fixkosten</th><th>Rhythmus</th><th>Person</th><th>Betrag/Monat</th></tr></thead><tbody>';
      activeFix.forEach(function(f){var cat=S.data.categories.find(function(x){return x.id===f.category;});var r=RHYTHMUS.find(function(r){return r.id===f.rhythmus;});html+='<tr><td>'+f.label+'</td><td>'+(r?r.label:"")+'</td><td>'+(f.person||"")+'</td><td class="neg">-'+eur(fixMo(f))+'</td></tr>';});
      html+='</tbody></table>';
    }
  });

  // Category summary if multiple months
  if(months.length>1){
    html+='<h2>Kategorie-Zusammenfassung</h2><table><thead><tr><th>Kategorie</th>';
    months.forEach(function(mp){html+='<th>'+MONTHS[mp.month]+' '+mp.year+'</th>';});
    html+='</tr></thead><tbody>';
    S.data.categories.forEach(function(cat){
      html+='<tr><td>'+cat.label+'</td>';
      months.forEach(function(mp){var md=getMonthData(mp.month,mp.year);html+='<td>'+eur(md.catData[cat.id]||0)+'</td>';});
      html+='</tr>';
    });
    html+='</tbody></table>';
  }

  html+='</body></html>';
  win.document.write(html);
  win.document.close();
  win.print();
}

async function doKIAnalyse(){
  S.kiLoading=true;S.kiResult="";render();
  try{
    // Build anonymized financial summary
    var now=new Date();
    var months12=[];
    for(var i=11;i>=0;i--){
      var d=new Date(now.getFullYear(),now.getMonth()-i,1);
      var md=getMonthData(d.getMonth(),d.getFullYear());
      months12.push({monat:MONTHS[d.getMonth()]+" "+d.getFullYear(),einnahmen:Math.round(md.tInc),ausgaben:Math.round(md.tExp),fixkosten:Math.round(md.tFix),variabel:Math.round(md.tVar),bilanz:Math.round(md.bal),kategorien:{}});
      S.data.categories.forEach(function(cat){months12[months12.length-1].kategorien[cat.label]=Math.round(md.catData[cat.id]||0);});
    }
    var fixkosten=S.data.fixkosten.filter(function(f){return !f.isIncome;}).map(function(f){return{bezeichnung:f.label,betragProMonat:Math.round(fixYr(f)/12),rhythmus:f.rhythmus,kategorie:getCat(f.category).label};});
    var fixeinnahmen=S.data.fixkosten.filter(function(f){return f.isIncome;}).map(function(f){return{bezeichnung:f.label,betragProMonat:Math.round(fixYr(f)/12),rhythmus:f.rhythmus};});
    var budgets={};S.data.categories.forEach(function(cat){if(S.data.budgets[cat.id])budgets[cat.label]={budget:S.data.budgets[cat.id],typ:getBudgetType(cat.id)};});

    var prompt="Du bist ein erfahrener Finanzberater. Analysiere diese anonymisierten Haushaltsdaten einer deutschen Familie und gib eine ausführliche, ehrliche und konstruktive Finanzanalyse auf Deutsch.\n\n"+
      "MONATLICHE DATEN (letzte 12 Monate):\n"+JSON.stringify(months12,null,2)+"\n\n"+
      "FIXKOSTEN:\n"+JSON.stringify(fixkosten,null,2)+"\n\n"+
      "FIXEINNAHMEN:\n"+JSON.stringify(fixeinnahmen,null,2)+"\n\n"+
      "BUDGETS:\n"+JSON.stringify(budgets,null,2)+"\n\n"+
      "Bitte analysiere:\n"+
      "1. 💰 SPARQUOTE: Wie hoch ist die durchschnittliche Sparquote? Ist sie gut oder schlecht?\n"+
      "2. 📈 AUSGABENTRENDS: Welche Kategorien steigen/sinken? Auffälligkeiten?\n"+
      "3. ⚠️ OPTIMIERUNGSPOTENZIAL: Wo könnten konkret Kosten gespart werden? Mit geschätztem Betrag in EUR.\n"+
      "4. 🔍 FIXKOSTEN-CHECK: Gibt es Fixkosten die hoch erscheinen oder potenziell überflüssig sein könnten?\n"+
      "5. 🎯 TOP 3 EMPFEHLUNGEN: Die 3 wichtigsten konkreten Maßnahmen mit geschätztem Sparpotenzial.\n\n"+
      "Sei konkret, ehrlich und konstruktiv. Verwende keine persönlichen Daten. Halte dich an die Zahlen.";

    var resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
    });
    var data=await resp.json();
    S.kiResult=data.content&&data.content[0]?data.content[0].text:"Keine Antwort erhalten.";
  }catch(e){
    S.kiResult="Fehler bei der Analyse: "+e.message+"\n\nBitte stelle sicher dass du mit dem Internet verbunden bist.";
  }
  S.kiLoading=false;render();
}

var BUDGET_IMPORT_DATA=[];

function doImportBudget(){
  if(!confirm('1.229 Eintraege aus der Budget App importieren? Bereits vorhandene Eintraege bleiben erhalten.'))return;
  var imported=0,skipped=0;
  var existingIds=new Set(S.data.entries.map(function(e){return String(e.id);}));
  BUDGET_IMPORT_DATA.forEach(function(e){
    if(existingIds.has(e.id)){skipped++;return;}
    var cat=S.data.categories.find(function(c){return c.id===e.category;});
    if(!cat)e.category=S.data.categories[0].id;
    var person=S.data.persons.find(function(p){return p===e.person;});
    if(!person)e.person='Gemeinsam';
    S.data.entries.push(e);
    imported++;
  });
  S.data.entries.sort(function(a,b){return b.date.localeCompare(a.date);});
  addLog("import","Budget App Import",imported+" Eintraege importiert");
  saveData();
  S.importMsg=imported+' Eintraege importiert'+(skipped>0?', '+skipped+' bereits vorhanden':'')+'!';
  render();
  setTimeout(function(){S.importMsg='';render();},4000);
}

function doImportCSV(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result;
      var lines=text.split('\n');
      var header=lines[0].split(';').map(function(h){return h.trim().toLowerCase();});
      var dateIdx=header.indexOf('datum'),typIdx=header.indexOf('typ'),amtIdx=header.indexOf('betrag'),noteIdx=header.indexOf('beschreibung');
      if(dateIdx<0||amtIdx<0){alert('Format nicht erkannt. Erwartet: Datum;Typ;Betrag;Kategorie;Person;Beschreibung');return;}
      var imported=0;
      lines.slice(1).forEach(function(line,i){
        if(!line.trim())return;
        var parts=line.split(';');
        var dateRaw=(parts[dateIdx]||'').trim();
        var dp=dateRaw.split('.');
        if(dp.length!==3)return;
        var date=dp[2]+'-'+dp[1]+'-'+dp[0];
        var amount=parseFloat((parts[amtIdx]||'0').trim().replace(',','.'));
        if(isNaN(amount)||amount<=0)return;
        var typ=(parts[typIdx]||'Ausgabe').trim();
        var note=(noteIdx>=0?parts[noteIdx]||'':'').trim();
        S.data.entries.push({id:'csv_'+Date.now()+'_'+i,date:date,type:typ==='Einnahme'?'einnahme':'ausgabe',category:S.data.categories[0].id,amount:Math.round(amount*100)/100,person:'Gemeinsam',note:note,imported:true});
        imported++;
      });
      S.data.entries.sort(function(a,b){return b.date.localeCompare(a.date);});
      saveData();S.importMsg=imported+' Eintraege importiert!';render();
      setTimeout(function(){S.importMsg='';render();},4000);
    };
    reader.readAsText(file,'latin-1');
  };
  inp.click();
}

function doCSV(){var sep=";",allCats=S.data.categories.concat([INCOME_CAT]);var hdr=["Datum","Typ","Kategorie","Person","Betrag","Notiz"].join(sep);var eL=S.data.entries.map(function(e){var cat=allCats.find(function(x){return x.id===e.category;});var b=(e.type==="einnahme"?e.amount:-e.amount).toFixed(2).replace(".",",");return[e.date,e.type==="einnahme"?"Einnahme":"Ausgabe",cat?cat.label:e.category,e.person,b,'"'+(e.note||"")+'"'].join(sep);});var fL=S.data.fixkosten.map(function(f){var cat=S.data.categories.find(function(x){return x.id===f.category;});var b=(f.isIncome?f.amount:-f.amount).toFixed(2).replace(".",",");var rh=RHYTHMUS.find(function(r){return r.id===f.rhythmus;});return[f.startDate||"",f.isIncome?"Fixeinnahme":"Fixkosten",cat?cat.label:"",f.person||"",b,'"'+f.label+' ('+(rh?rh.label:"")+')'+'"'].join(sep);});var sH=["Monat","Einnahmen","Variabel","Fixkosten","Gesamt","Bilanz"].join(sep);var sL=MONTHS.map(function(m,i){var me=S.data.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===i&&dt.getFullYear()===S.fYear;});var fM=S.data.fixkosten.filter(function(f){return !f.isIncome&&fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);var fI=S.data.fixkosten.filter(function(f){return f.isIncome&&fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);var inc=me.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0)+fI;var vr=me.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);return[m+" "+S.fYear,inc.toFixed(2).replace(".",","),vr.toFixed(2).replace(".",","),fM.toFixed(2).replace(".",","),(vr+fM).toFixed(2).replace(".",","),(inc-vr-fM).toFixed(2).replace(".",",")].join(sep);});S.expModal={title:"CSV fuer Excel",content:[hdr].concat(eL).concat(fL).concat(["","=== MONATSUEBERSICHT ===",sH]).concat(sL).join("\n"),hint:"Kopiere -> Excel -> Zelle A1 -> Einfuegen."};render();}
