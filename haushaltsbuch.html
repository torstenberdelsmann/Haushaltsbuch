<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Familienfinanzen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f0f13;color:#e8e6f0;overscroll-behavior:none}
  input,select,textarea,button{font-family:inherit}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ── Constants ──────────────────────────────────────────────────────────────
const DEFAULT_CATS=[
  {id:"lebensmittel",label:"Lebensmittel",icon:"🛒",color:"#4ade80"},
  {id:"miete",label:"Miete/Wohnen",icon:"🏠",color:"#60a5fa"},
  {id:"freizeit",label:"Freizeit",icon:"🎮",color:"#f472b6"},
  {id:"versicherung",label:"Versicherungen",icon:"🛡️",color:"#a78bfa"},
  {id:"transport",label:"Auto/Transport",icon:"🚗",color:"#fb923c"},
  {id:"urlaub",label:"Urlaub",icon:"✈️",color:"#34d399"},
  {id:"gesundheit",label:"Gesundheit",icon:"💊",color:"#f87171"},
  {id:"restaurant",label:"Restaurants",icon:"🍽️",color:"#fbbf24"},
];
const INCOME_CAT={id:"einnahmen",label:"Einnahmen",icon:"💰",color:"#86efac"};
const EMOJIS=["🛒","🏠","🎮","🛡️","🚗","✈️","💊","🍽️","💰","🎓","👶","🐾","💄","🎵","📱","🏋️","🌿","🔧","🎁","🏦","🍺","🚌","💡","🧾","🏪","🎯","🧹","👗","🚿","🛁","🐶","🎪","🌴","⚽","🎸"];
const COLORS=["#4ade80","#60a5fa","#f472b6","#a78bfa","#fb923c","#34d399","#f87171","#fbbf24","#38bdf8","#e879f9","#84cc16","#f97316","#06b6d4","#ec4899","#8b5cf6","#14b8a6"];
const MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const RHYTHMUS=[
  {id:"monatlich",label:"Monatlich",short:"mtl."},
  {id:"woechentlich",label:"Wöchentlich",short:"wöch."},
  {id:"quartalsweise",label:"Quartalsweise",short:"Quartal"},
  {id:"jaehrlich",label:"Jährlich",short:"jährl."},
];
const DEFAULT_BUDGETS={lebensmittel:600,miete:1200,freizeit:200,versicherung:150,transport:250,urlaub:300,gesundheit:100,restaurant:150};
const DEFAULT_PERSONS=["Gemeinsam","Partner 1","Partner 2"];
const STORAGE_KEY="familienfinanzen_v1";
const INIT={entries:[],fixkosten:[],categories:DEFAULT_CATS,persons:DEFAULT_PERSONS,budgets:DEFAULT_BUDGETS,lastBackup:null};

// ── Storage ────────────────────────────────────────────────────────────────
function load(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

// ── Helpers ────────────────────────────────────────────────────────────────
const eur=n=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0);
const genId=()=>"id_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
function fixActive(fix,month){
  if(fix.rhythmus==="monatlich"||fix.rhythmus==="woechentlich") return true;
  if(fix.rhythmus==="quartalsweise"){const sm=fix.startDate?new Date(fix.startDate).getMonth():0;return(month-sm+12)%3===0;}
  if(fix.rhythmus==="jaehrlich"){return fix.startDate?new Date(fix.startDate).getMonth()===month:true;}
  return false;
}
function fixMonthly(fix){return fix.rhythmus==="woechentlich"?fix.amount*4.33:fix.amount;}
function fixYearly(fix){return fix.rhythmus==="monatlich"?fix.amount*12:fix.rhythmus==="woechentlich"?fix.amount*52:fix.rhythmus==="quartalsweise"?fix.amount*4:fix.amount;}
function fixEst(amount,rhythmus){return rhythmus==="woechentlich"?amount*4.33:rhythmus==="quartalsweise"?amount/3:rhythmus==="jaehrlich"?amount/12:amount;}

// ── UI Atoms ───────────────────────────────────────────────────────────────
const P={overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"flex-end",zIndex:200},sheet:{background:"#1a1a2e",borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"88vh",overflowY:"auto"},panel:{background:"#1a1a2e",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid rgba(255,255,255,0.07)"},inp:{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:11,color:"#fff",fontSize:13}};

function Sheet({children,onClose}){return(<div style={P.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={P.sheet}>{children}</div></div>);}
function Head({title,onClose}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontSize:16,fontWeight:700}}>{title}</div><button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:99,width:28,height:28,cursor:"pointer",fontSize:15}}>×</button></div>);}
function Lbl({t,mt=8}){return <div style={{fontSize:11,color:"#9ca3af",marginBottom:5,marginTop:mt,letterSpacing:1}}>{t}</div>;}
function PBtn({onClick,disabled,children,bg}){return(<button onClick={onClick} disabled={disabled} style={{width:"100%",background:disabled?"rgba(255,255,255,0.07)":(bg||"linear-gradient(135deg,#3b82f6,#8b5cf6)"),border:"none",color:"#fff",borderRadius:11,padding:13,fontSize:14,fontWeight:700,cursor:disabled?"default":"pointer",opacity:disabled?0.4:1}}>{children}</button>);}

// ── Cat Editor ─────────────────────────────────────────────────────────────
function CatEditor({cat,onSave,onClose}){
  const[label,setLabel]=useState(cat?.label||"");
  const[icon,setIcon]=useState(cat?.icon||"🎯");
  const[color,setColor]=useState(cat?.color||"#60a5fa");
  const save=()=>{if(!label.trim())return;onSave({...cat,label:label.trim(),icon,color,id:cat?.id||genId()});onClose();};
  return(<Sheet onClose={onClose}><Head title={cat?.id?"✏️ Bearbeiten":"➕ Neue Kategorie"} onClose={onClose}/>
    <div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 14px",marginBottom:18,border:`1px solid ${color}40`}}><div style={{fontSize:30}}>{icon}</div><div><div style={{fontSize:15,fontWeight:700,color}}>{label||"Vorschau"}</div><div style={{fontSize:11,color:"#6b7280"}}>Vorschau</div></div></div>
    <Lbl t="NAME" mt={0}/><input value={label} onChange={e=>setLabel(e.target.value)} placeholder="z.B. Haustier…" style={{...P.inp,marginBottom:14}}/>
    <Lbl t="ICON"/><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{EMOJIS.map(e=><button key={e} onClick={()=>setIcon(e)} style={{width:38,height:38,fontSize:19,background:icon===e?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.06)",border:icon===e?"2px solid #60a5fa":"1px solid rgba(255,255,255,0.1)",borderRadius:9,cursor:"pointer"}}>{e}</button>)}</div>
    <Lbl t="FARBE"/><div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}>{COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:32,height:32,background:c,border:color===c?"3px solid #fff":"2px solid transparent",borderRadius:99,cursor:"pointer",boxShadow:color===c?`0 0 8px ${c}`:"none"}}/>)}</div>
    <PBtn onClick={save} disabled={!label.trim()}>{cat?.id?"Speichern":"Erstellen"}</PBtn>
  </Sheet>);
}

// ── Fix Editor ─────────────────────────────────────────────────────────────
function FixEditor({fix,categories,onSave,onClose}){
  const[label,setLabel]=useState(fix?.label||"");
  const[amount,setAmount]=useState(fix?.amount?.toString()||"");
  const[rhythmus,setRhythmus]=useState(fix?.rhythmus||"monatlich");
  const[catId,setCatId]=useState(fix?.category||categories[0]?.id||"");
  const[startD,setStartD]=useState(fix?.startDate||today());
  const save=()=>{if(!label.trim()||!amount||isNaN(+amount))return;onSave({...fix,id:fix?.id||genId(),label:label.trim(),amount:+amount,rhythmus,category:catId,startDate:startD});onClose();};
  const est=+amount?fixEst(+amount,rhythmus):0;
  return(<Sheet onClose={onClose}><Head title={fix?.id?"✏️ Fixkosten bearbeiten":"➕ Neue Fixkosten"} onClose={onClose}/>
    {label&&+amount>0&&<div style={{background:"#1e2a1e",borderRadius:12,padding:"11px 14px",marginBottom:14,border:"1px solid rgba(74,222,128,0.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:600}}>{label}</div><div style={{fontSize:11,color:"#9ca3af"}}>≈ {eur(est)}/Monat</div></div><div style={{fontSize:15,fontWeight:700,color:"#f87171"}}>{eur(+amount)}</div></div>}
    <Lbl t="BEZEICHNUNG" mt={0}/><input value={label} onChange={e=>setLabel(e.target.value)} placeholder="z.B. Miete, Netflix…" style={{...P.inp,marginBottom:12}}/>
    <Lbl t="BETRAG (€)" mt={0}/><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" style={{...P.inp,fontSize:19,fontWeight:700,marginBottom:12}}/>
    <Lbl t="RHYTHMUS" mt={0}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}}>{RHYTHMUS.map(r=><button key={r.id} onClick={()=>setRhythmus(r.id)} style={{background:rhythmus===r.id?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.05)",border:`1px solid ${rhythmus===r.id?"#3b82f6":"rgba(255,255,255,0.1)"}`,color:rhythmus===r.id?"#60a5fa":"#9ca3af",borderRadius:9,padding:9,cursor:"pointer",fontSize:12,fontWeight:rhythmus===r.id?700:400}}>{r.label}</button>)}</div>
    <Lbl t="KATEGORIE" mt={0}/><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{categories.map(c=><button key={c.id} onClick={()=>setCatId(c.id)} style={{background:catId===c.id?`${c.color}25`:"rgba(255,255,255,0.05)",border:`1px solid ${catId===c.id?c.color:"rgba(255,255,255,0.1)"}`,color:catId===c.id?c.color:"#9ca3af",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>{c.icon} {c.label}</button>)}</div>
    <Lbl t="STARTDATUM" mt={0}/><input type="date" value={startD} onChange={e=>setStartD(e.target.value)} style={{...P.inp,marginBottom:20}}/>
    <PBtn onClick={save} disabled={!label.trim()||!amount}>{fix?.id?"Änderungen speichern":"Fixkosten hinzufügen"}</PBtn>
  </Sheet>);
}

// ── Main App ───────────────────────────────────────────────────────────────
function App(){
  const[appData,setAppData]=useState(()=>{const d=load();return d?{...INIT,...d}:INIT;});
  const[tab,setTab]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[editCat,setEditCat]=useState(null);
  const[editFix,setEditFix]=useState(null);
  const[delCat,setDelCat]=useState(null);
  const[expModal,setExpModal]=useState(null);
  const[syncModal,setSyncModal]=useState(false);
  const[syncCode,setSyncCode]=useState("");
  const[syncMsg,setSyncMsg]=useState("");
  const[copied,setCopied]=useState(false);
  const[fMonth,setFMonth]=useState(new Date().getMonth());
  const[fYear,setFYear]=useState(new Date().getFullYear());
  const[scanning,setScanning]=useState(false);
  const[scanMsg,setScanMsg]=useState("");
  const[ausFilt,setAusFilt]=useState("alle");
  const[form,setForm]=useState({type:"ausgabe",catId:DEFAULT_CATS[0].id,amount:"",person:"Gemeinsam",note:"",date:today(),fixRhythmus:"monatlich"});
  const fileRef=useRef();
  const importRef=useRef();

  useEffect(()=>{save(appData);},[appData]);
  useEffect(()=>{const{categories}=appData;setForm(f=>categories.find(c=>c.id===f.catId)?f:{...f,catId:categories[0]?.id||""});},[appData.categories]);

  const{entries,fixkosten,categories,persons,budgets,lastBackup}=appData;
  const allCats=[...categories,INCOME_CAT];
  const activeFix=fixkosten.filter(f=>fixActive(f,fMonth));
  const totalFix=activeFix.reduce((s,f)=>s+fixMonthly(f),0);
  const mEntries=entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===fMonth&&d.getFullYear()===fYear;});
  const totalInc=mEntries.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0);
  const totalVar=mEntries.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0);
  const totalExp=totalVar+totalFix;
  const balance=totalInc-totalExp;
  const showBackup=!lastBackup||(Date.now()-lastBackup)/86400000>=7;
  const getCat=id=>allCats.find(c=>c.id===id)||categories[0];
  const catExp=id=>mEntries.filter(e=>e.category===id&&e.type==="ausgabe").reduce((s,e)=>s+e.amount,0)+activeFix.filter(f=>f.category===id).reduce((s,f)=>s+fixMonthly(f),0);
  const upd=(key,val)=>setAppData(prev=>({...prev,[key]:typeof val==="function"?val(prev[key]):val}));

  function addEntry(){
    if(!form.amount||isNaN(+form.amount))return;
    if(form.type==="fixkosten"){const cat=getCat(form.catId);upd("fixkosten",p=>[...p,{id:genId(),label:form.note||cat?.label||"Fix",amount:+form.amount,rhythmus:form.fixRhythmus,category:form.catId,startDate:form.date}]);}
    else upd("entries",p=>[{id:Date.now(),type:form.type,category:form.catId,amount:+form.amount,person:form.person,note:form.note,date:form.date},...p]);
    setModal(null);setForm(f=>({...f,amount:"",note:"",date:today()}));
  }
  function saveCat(c){upd("categories",p=>p.find(x=>x.id===c.id)?p.map(x=>x.id===c.id?c:x):[...p,c]);if(!budgets[c.id])upd("budgets",b=>({...b,[c.id]:0}));}
  function delCatFn(id){upd("categories",p=>p.filter(c=>c.id!==id));upd("budgets",b=>{const n={...b};delete n[id];return n;});setDelCat(null);}
  function saveFix(f){upd("fixkosten",p=>p.find(x=>x.id===f.id)?p.map(x=>x.id===f.id?f:x):[...p,f]);}

  function copyText(text){
    navigator.clipboard.writeText(text).catch(()=>{const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);});
    setCopied(true);setTimeout(()=>setCopied(false),2500);
  }

  // Sync code: base64 encoded JSON
  function generateSyncCode(){
    const code=btoa(unescape(encodeURIComponent(JSON.stringify({...appData,syncedAt:Date.now()}))));
    setSyncCode(code);upd("lastBackup",Date.now());
  }
  function importSyncCode(){
    try{
      const data=JSON.parse(decodeURIComponent(escape(atob(syncCode.trim()))));
      // Merge: keep newest entries by combining and deduplicating
      setAppData(prev=>{
        const eIds=new Set(prev.entries.map(e=>e.id));
        const fIds=new Set(prev.fixkosten.map(f=>f.id));
        const newEntries=[...prev.entries,...(data.entries||[]).filter(e=>!eIds.has(e.id))];
        const newFix=[...prev.fixkosten,...(data.fixkosten||[]).filter(f=>!fIds.has(f.id))];
        return{...prev,...data,entries:newEntries,fixkosten:newFix};
      });
      setSyncMsg("✅ Erfolgreich synchronisiert! "+((data.entries?.length||0))+" Einträge importiert.");
    }catch{setSyncMsg("⚠️ Ungültiger Code. Bitte erneut versuchen.");}
  }

  function doCSV(){
    const sep=";";
    const hdr=["Datum","Typ","Kategorie","Person","Betrag","Notiz"].join(sep);
    const eL=entries.map(e=>{const c=allCats.find(x=>x.id===e.category);const b=(e.type==="einnahme"?e.amount:-e.amount).toFixed(2).replace(".",",");return[e.date,e.type==="einnahme"?"Einnahme":"Ausgabe",c?.label||e.category,e.person,b,`"${e.note||""}"`].join(sep);});
    const fL=fixkosten.map(f=>{const c=categories.find(x=>x.id===f.category);const b=(-f.amount).toFixed(2).replace(".",",");return[f.startDate||"","Fixkosten",c?.label||f.category,"–",b,`"${f.label} (${RHYTHMUS.find(r=>r.id===f.rhythmus)?.label})"`].join(sep);});
    const blank=["","","","","",""].join(sep);
    const sH=["Monat","Einnahmen","Variabel","Fixkosten","Gesamt","Bilanz"].join(sep);
    const sL=MONTHS.map((m,i)=>{const me=entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===i&&d.getFullYear()===fYear;});const fM=fixkosten.filter(f=>fixActive(f,i)).reduce((s,f)=>s+fixMonthly(f),0);const inc=me.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0);const vr=me.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0);return[`${m} ${fYear}`,inc.toFixed(2).replace(".",","),vr.toFixed(2).replace(".",","),fM.toFixed(2).replace(".",","),(vr+fM).toFixed(2).replace(".",","),(inc-vr-fM).toFixed(2).replace(".",",")].join(sep);});
    const content=[hdr,...eL,...fL,blank,"=== MONATSÜBERSICHT ===",sH,...sL].join("\n");
    setExpModal({type:"text",title:"📊 CSV für Excel",content,hint:"Kopiere → Excel → Zelle A1 → Einfügen (Trennzeichen: Semikolon)"});
  }
  function doBackup(){
    const content=JSON.stringify({...appData,exportedAt:new Date().toISOString()},null,2);
    setExpModal({type:"text",title:"💾 Backup (JSON)",content,hint:"Kopiere und speichere als .json Datei."});
    upd("lastBackup",Date.now());
  }

  async function handleScan(e){
    const file=e.target.files[0];if(!file)return;e.target.value="";
    setScanning(true);setScanMsg("");setModal("scan");
    const catIds=categories.map(c=>c.id).join(", ");
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:reader.result.split(",")[1]}},{type:"text",text:`Kassenbon: Betrag, Kategorie (aus: ${catIds}), Datum (YYYY-MM-DD), Händler. NUR JSON: {"amount":number,"category":"...","date":"...","note":"..."}`}]}]})});
        const d=await res.json();
        const p=JSON.parse((d.content?.map(i=>i.text||"").join("")||"").replace(/```json|```/g,"").trim());
        setForm(f=>({...f,amount:p.amount?.toString()||"",catId:categories.find(c=>c.id===p.category)?.id||categories[0]?.id,note:p.note||"",date:p.date||f.date,type:"ausgabe"}));
        setScanMsg("✅ Erkannt!");
      }catch{setScanMsg("⚠️ Nicht erkannt – manuell eingeben.");}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  const yearData=MONTHS.map((m,i)=>{const me=entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===i&&d.getFullYear()===fYear;});const fM=fixkosten.filter(f=>fixActive(f,i)).reduce((s,f)=>s+fixMonthly(f),0);return{m,vr:me.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0),fx:fM,inc:me.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0)};});
  const maxY=Math.max(...yearData.map(d=>Math.max(d.vr+d.fx,d.inc)),1);

  return(
  <div style={{background:"#0f0f13",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",padding:"20px 15px 17px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:15}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:"#9ca3af",textTransform:"uppercase",marginBottom:3}}>Haushaltsbuch</div>
          <div style={{fontSize:20,fontWeight:700}}>Familienfinanzen</div>
          <button onClick={()=>{setSyncCode("");setSyncMsg("");setSyncModal(true);}} style={{fontSize:11,color:"#60a5fa",background:"none",border:"none",padding:0,cursor:"pointer",marginTop:2}}>🔄 Sync mit Partner</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          <select value={fMonth} onChange={e=>setFMonth(+e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"3px 6px",fontSize:11}}>
            {MONTHS.map((m,i)=><option key={i} value={i} style={{background:"#1a1a2e"}}>{m}</option>)}
          </select>
          <select value={fYear} onChange={e=>setFYear(+e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"3px 6px",fontSize:11}}>
            {[2024,2025,2026,2027].map(y=><option key={y} value={y} style={{background:"#1a1a2e"}}>{y}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {[{l:"Einnahmen",v:totalInc,c:"#4ade80"},{l:"Fixkosten",v:totalFix,c:"#a78bfa"},{l:"Variabel",v:totalVar,c:"#f87171"},{l:"Bilanz",v:balance,c:balance>=0?"#60a5fa":"#fb923c"}].map(x=>(

    {/* FABs */}
    <div style={{position:"fixed",bottom:85,right:14,display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end"}}>
      <button onClick={()=>fileRef.current?.click()} style={{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:99,padding:"8px 14px",fontSize:12,cursor:"pointer",boxShadow:"0 3px 15px rgba(0,0,0,0.5)"}}>📷 Scan</button>
      <button onClick={()=>setModal("add")} style={{background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",color:"#fff",borderRadius:99,padding:"12px 19px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 3px 15px rgba(59,130,246,0.4)"}}>+ Eintrag</button>
    </div>
    <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleScan}/>

    {/* Bottom Nav */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#1a1a2e",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-around",padding:"6px 0"}}>
      {[["dashboard","📊","Übersicht"],["fixkosten","📌","Fix"],["kategorien","🗂️","Kateg."],["eintraege","📋","Eintr."],["auswertung","📈","Trend"],["settings","⚙️","Einst."]].map(([id,ic,lb])=>(
        <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",color:tab===id?"#60a5fa":"#6b7280",display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer",padding:"3px 4px"}}>
          <span style={{fontSize:15}}>{ic}</span><span style={{fontSize:9}}>{lb}</span>
        </button>
      ))}
    </div>

    {/* Add/Scan Modal */}
    {(modal==="add"||modal==="scan")&&<Sheet onClose={()=>setModal(null)}>
      <Head title={modal==="scan"?"📷 Scan":"Neuer Eintrag"} onClose={()=>setModal(null)}/>
      {scanning&&<div style={{textAlign:"center",padding:18,color:"#9ca3af"}}>⏳ KI analysiert…</div>}
      {scanMsg&&<div style={{marginBottom:12,padding:8,background:"rgba(255,255,255,0.05)",borderRadius:8,fontSize:11,color:"#9ca3af"}}>{scanMsg}</div>}
      {!scanning&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          {[{id:"ausgabe",lb:"💸 Variabel",c:"#f87171",bg:"rgba(248,113,113,0.15)"},{id:"fixkosten",lb:"📌 Fix",c:"#a78bfa",bg:"rgba(167,139,250,0.15)"},{id:"einnahme",lb:"💰 Einnahme",c:"#4ade80",bg:"rgba(74,222,128,0.15)"}].map(t=>(
            <button key={t.id} onClick={()=>setForm(f=>({...f,type:t.id}))} style={{background:form.type===t.id?t.bg:"rgba(255,255,255,0.05)",border:`1px solid ${form.type===t.id?t.c:"rgba(255,255,255,0.1)"}`,color:form.type===t.id?t.c:"#9ca3af",borderRadius:9,padding:"8px 2px",cursor:"pointer",fontSize:11,fontWeight:form.type===t.id?700:400}}>{t.lb}</button>
          ))}
        </div>
        {form.type==="fixkosten"&&<div style={{marginBottom:12,background:"rgba(167,139,250,0.06)",borderRadius:10,padding:10,border:"1px solid rgba(167,139,250,0.2)"}}>
          <div style={{fontSize:10,color:"#a78bfa",marginBottom:6,fontWeight:600,letterSpacing:1}}>RHYTHMUS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
            {RHYTHMUS.map(r=><button key={r.id} onClick={()=>setForm(f=>({...f,fixRhythmus:r.id}))} style={{background:form.fixRhythmus===r.id?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.05)",border:`1px solid ${form.fixRhythmus===r.id?"#a78bfa":"rgba(255,255,255,0.1)"}`,color:form.fixRhythmus===r.id?"#a78bfa":"#9ca3af",borderRadius:8,padding:"7px",cursor:"pointer",fontSize:11,fontWeight:form.fixRhythmus===r.id?700:400}}>{r.label}</button>)}
          </div>
          {form.amount&&<div style={{marginTop:6,fontSize:10,color:"#6b7280",textAlign:"center"}}>≈ {eur(fixEst(+form.amount||0,form.fixRhythmus))} / Monat</div>}
        </div>}
        <Lbl t="BETRAG (€)" mt={0}/><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" style={{...P.inp,fontSize:19,fontWeight:700,marginBottom:10}}/>
        <Lbl t="KATEGORIE" mt={0}/><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
          {(form.type==="einnahme"?[...categories,INCOME_CAT]:categories).map(cat=>(
            <button key={cat.id} onClick={()=>setForm(f=>({...f,catId:cat.id}))} style={{background:form.catId===cat.id?`${cat.color}22`:"rgba(255,255,255,0.05)",border:`1px solid ${form.catId===cat.id?cat.color:"rgba(255,255,255,0.1)"}`,color:form.catId===cat.id?cat.color:"#9ca3af",borderRadius:7,padding:"4px 8px",cursor:"pointer",fontSize:11}}>{cat.icon} {cat.label}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:form.type==="fixkosten"?"1fr":"1fr 1fr",gap:8,marginBottom:10}}>
          {form.type!=="fixkosten"&&<div>
            <Lbl t="PERSON" mt={0}/><select value={form.person} onChange={e=>setForm(f=>({...f,person:e.target.value}))} style={{width:"100%",background:"#0f0f13",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px",color:"#fff",fontSize:12}}>
              {persons.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>}
          <div>
            <Lbl t={form.type==="fixkosten"?"STARTDATUM":"DATUM"} mt={0}/><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:"100%",background:"#0f0f13",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px",color:"#fff",fontSize:12}}/>
          </div>
        </div>
        <Lbl t={form.type==="fixkosten"?"BEZEICHNUNG":"NOTIZ (optional)"} mt={0}/>
        <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder={form.type==="fixkosten"?"z.B. Miete, Netflix…":"z.B. Edeka, Tankstelle…"} style={{...P.inp,marginBottom:16}}/>
        <PBtn onClick={addEntry} bg={form.type==="fixkosten"?"linear-gradient(135deg,#7c3aed,#a78bfa)":form.type==="einnahme"?"linear-gradient(135deg,#166534,#16a34a)":undefined}>
          {form.type==="fixkosten"?"📌 Fixkosten speichern":form.type==="einnahme"?"💰 Einnahme speichern":"💸 Ausgabe speichern"}
        </PBtn>
      </>}
    </Sheet>}

    {/* Sync Modal */}
    {syncModal&&<Sheet onClose={()=>setSyncModal(false)}>
      <Head title="🔄 Sync mit Partner" onClose={()=>setSyncModal(false)}/>
      <div style={{background:"rgba(96,165,250,0.08)",borderRadius:10,padding:"10px 12px",marginBottom:16,border:"1px solid rgba(96,165,250,0.2)",fontSize:12,color:"#9ca3af",lineHeight:1.5}}>
        So synchronisiert ihr eure Daten:<br/>
        <strong style={{color:"#60a5fa"}}>Person A</strong> erstellt einen Sync-Code → schickt ihn per WhatsApp → <strong style={{color:"#60a5fa"}}>Person B</strong> importiert ihn. Dann umgekehrt!
      </div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>📤 Schritt 1: Sync-Code erstellen</div>
      <button onClick={generateSyncCode} style={{width:"100%",background:"linear-gradient(135deg,#1e3a5f,#2563eb)",border:"none",color:"#fff",borderRadius:10,padding:11,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:syncCode?10:16}}>
        🔑 Meinen Sync-Code generieren
      </button>
      {syncCode&&<>
        <textarea readOnly value={syncCode} onClick={e=>e.target.select()} style={{width:"100%",height:70,background:"#0f0f13",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:9,color:"#9ca3af",fontSize:10,fontFamily:"monospace",resize:"none",marginBottom:8}}/>
        <button onClick={()=>copyText(syncCode)} style={{width:"100%",background:copied?"linear-gradient(135deg,#166534,#16a34a)":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",color:"#fff",borderRadius:9,padding:10,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:16}}>
          {copied?"✅ Kopiert! Jetzt per WhatsApp schicken":"📋 Code kopieren & per WhatsApp schicken"}
        </button>
      </>}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>📥 Schritt 2: Sync-Code importieren</div>
        <textarea value={syncCode||""} onChange={e=>setSyncCode(e.target.value)} placeholder="Sync-Code hier einfügen…" style={{width:"100%",height:70,background:"#0f0f13",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:9,color:"#fff",fontSize:10,fontFamily:"monospace",resize:"none",marginBottom:8}}/>
        {syncMsg&&<div style={{fontSize:11,color:syncMsg.includes("✅")?"#4ade80":"#f87171",marginBottom:8,padding:"6px 9px",background:"rgba(255,255,255,0.05)",borderRadius:7}}>{syncMsg}</div>}
        <PBtn onClick={importSyncCode} disabled={!syncCode.trim()}>📥 Importieren & zusammenführen</PBtn>
      </div>
    </Sheet>}

    {/* Export text modal */}
    {expModal?.type==="text"&&<Sheet onClose={()=>setExpModal(null)}>
      <Head title={expModal.title} onClose={()=>setExpModal(null)}/>
      <div style={{fontSize:11,color:"#9ca3af",marginBottom:10,background:"rgba(255,255,255,0.05)",borderRadius:7,padding:"7px 9px"}}>{expModal.hint}</div>
      <textarea readOnly value={expModal.content} onClick={e=>e.target.select()} style={{width:"100%",height:170,background:"#0f0f13",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:10,color:"#9ca3af",fontSize:10,fontFamily:"monospace",resize:"none",marginBottom:10}}/>
      <PBtn onClick={()=>copyText(expModal.content)} bg={copied?"linear-gradient(135deg,#166534,#16a34a)":undefined}>{copied?"✅ Kopiert!":"📋 Alles kopieren"}</PBtn>
    </Sheet>}

    {/* Editors */}
    {editFix!==null&&<FixEditor fix={editFix?.id?editFix:null} categories={categories} onSave={saveFix} onClose={()=>setEditFix(null)}/>}
    {editCat!==null&&<CatEditor cat={editCat?.id?editCat:null} onSave={saveCat} onClose={()=>setEditCat(null)}/>}

    {/* Confirm delete */}
    {delCat&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
      <div style={{background:"#1a1a2e",borderRadius:16,padding:20,width:"100%",maxWidth:290,border:"1px solid rgba(248,113,113,0.25)"}}>
        <div style={{fontSize:28,textAlign:"center",marginBottom:9}}>{delCat.icon}</div>
        <div style={{fontSize:14,fontWeight:700,textAlign:"center",marginBottom:6}}>Kategorie löschen?</div>
        <div style={{fontSize:12,color:"#9ca3af",textAlign:"center",marginBottom:16}}>„{delCat.label}" wird entfernt.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={()=>setDelCat(null)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",borderRadius:9,padding:10,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={()=>delCatFn(delCat.id)} style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.4)",color:"#f87171",borderRadius:9,padding:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>Löschen</button>
        </div>
      </div>
    </div>}

  </div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
