<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Familienfinanzen</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f13;color:#e8e6f0;overscroll-behavior:none;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
button,input,select,textarea{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#fff2;border-radius:2px}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:200}
.sheet{background:#1a1a2e;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto}
.panel{background:#1a1a2e;border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.07)}
.inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px;color:#fff;font-size:13px}
.lbl{font-size:11px;color:#9ca3af;margin-bottom:5px;margin-top:8px;letter-spacing:1px}
.pbtn{width:100%;border:none;color:#fff;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
.hidden{display:none}
.tab-btn{flex:0 0 auto;padding:11px 11px;background:none;border:none;border-bottom:2px solid transparent;color:#6b7280;font-size:11px;cursor:pointer;white-space:nowrap}
.tab-btn.active{color:#60a5fa;border-bottom-color:#60a5fa;font-weight:700}
.chip{border-radius:7px;padding:5px 9px;cursor:pointer;font-size:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#9ca3af}
.chip.active{font-weight:700}
#loading{position:fixed;inset:0;background:#0f0f13;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999;font-size:14px;color:#9ca3af}
</style>
</head>
<body>

<div id="loading"><div style="font-size:36px">💰</div><div>Verbinde mit Firebase…</div></div>
<div id="app" class="hidden"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ── Firebase init ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyB15aAsNolTaEbvjGLZQudmZvID69jePjc",
  authDomain:"haushaltsbuch-ba7ff.firebaseapp.com",
  projectId:"haushaltsbuch-ba7ff",
  storageBucket:"haushaltsbuch-ba7ff.firebasestorage.app",
  messagingSenderId:"902171941871",
  appId:"1:902171941871:web:d349425550f2e47a3af41a"
});
const db = firebase.firestore();
const DOC = db.collection("haushaltsbuch").doc("shared");

// ── Constants ──────────────────────────────────────────────────────────────
const DEFAULT_CATS=[
  {id:"lebensmittel",label:"Lebensmittel",icon:"🛒",color:"#4ade80"},
  {id:"miete",label:"Miete/Wohnen",icon:"🏠",color:"#60a5fa"},
  {id:"freizeit",label:"Freizeit",icon:"🎮",color:"#f472b6"},
  {id:"versicherung",label:"Versicherungen",icon:"🛡️",color:"#a78bfa"},
  {id:"transport",label:"Auto/Transport",icon:"🚗",color:"#fb923c"},
  {id:"urlaub",label:"Urlaub",icon:"✈️",color:"#34d399"},
  {id:"gesundheit",label:"Gesundheit",icon:"💊",color:"#f87171"},
  {id:"restaurant",label:"Restaurants",icon:"🍽️",color:"#fbbf24"},
];
const INCOME_CAT={id:"einnahmen",label:"Einnahmen",icon:"💰",color:"#86efac"};
const EMOJIS=["🛒","🏠","🎮","🛡️","🚗","✈️","💊","🍽️","💰","🎓","👶","🐾","💄","🎵","📱","🏋️","🌿","🔧","🎁","🏦","🍺","🚌","💡","🧾","🏪","🎯","🧹","👗","🚿","🛁","🐶","🎪","🌴","⚽","🎸"];
const COLORS=["#4ade80","#60a5fa","#f472b6","#a78bfa","#fb923c","#34d399","#f87171","#fbbf24","#38bdf8","#e879f9","#84cc16","#f97316","#06b6d4","#ec4899","#8b5cf6","#14b8a6"];
const MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const RHYTHMUS=[
  {id:"monatlich",label:"Monatlich",short:"mtl."},
  {id:"woechentlich",label:"Wöchentlich",short:"wöch."},
  {id:"quartalsweise",label:"Quartalsweise",short:"Quartal"},
  {id:"jaehrlich",label:"Jährlich",short:"jährl."},
];
const DEFAULT_BUDGETS={lebensmittel:600,miete:1200,freizeit:200,versicherung:150,transport:250,urlaub:300,gesundheit:100,restaurant:150};

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  entries:[], fixkosten:[], categories:[...DEFAULT_CATS],
  persons:["Gemeinsam","Partner 1","Partner 2"],
  budgets:{...DEFAULT_BUDGETS}, lastBackup:null,
  // UI state (not saved)
  tab:"dashboard", fMonth:new Date().getMonth(), fYear:new Date().getFullYear(),
  modal:null, editCat:null, editFix:null, delCat:null, expModal:null,
  ausFilt:"alle", fbStatus:"connecting",
  form:{type:"ausgabe",catId:"lebensmittel",amount:"",person:"Gemeinsam",note:"",date:today(),fixRhythmus:"monatlich"},
  catEditor:{label:"",icon:"🎯",color:"#60a5fa"},
  fixEditor:{label:"",amount:"",rhythmus:"monatlich",catId:"lebensmittel",startDate:today()},
  skipSave:false, copied:false
};

// ── Helpers ────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function eur(n){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0);}
function genId(){return "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);}
function fixActive(fix,month){
  if(fix.rhythmus==="monatlich"||fix.rhythmus==="woechentlich") return true;
  if(fix.rhythmus==="quartalsweise"){const sm=fix.startDate?new Date(fix.startDate).getMonth():0;return(month-sm+12)%3===0;}
  if(fix.rhythmus==="jaehrlich"){return fix.startDate?new Date(fix.startDate).getMonth()===month:true;}
  return false;
}
function fixMonthly(fix){return fix.rhythmus==="woechentlich"?fix.amount*4.33:fix.amount;}
function fixYearly(fix){return fix.rhythmus==="monatlich"?fix.amount*12:fix.rhythmus==="woechentlich"?fix.amount*52:fix.rhythmus==="quartalsweise"?fix.amount*4:fix.amount;}
function fixEst(amount,rhythmus){return rhythmus==="woechentlich"?amount*4.33:rhythmus==="quartalsweise"?amount/3:rhythmus==="jaehrlich"?amount/12:amount;}
function getCat(id){return [...state.categories,INCOME_CAT].find(c=>c.id===id)||state.categories[0];}

// ── Firebase ───────────────────────────────────────────────────────────────
function getDataToSave(){
  return {entries:state.entries,fixkosten:state.fixkosten,categories:state.categories,persons:state.persons,budgets:state.budgets,lastBackup:state.lastBackup};
}
async function saveToFirebase(){
  try{
    await DOC.set({...getDataToSave(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    state.fbStatus="online";
  }catch(e){console.warn(e);state.fbStatus="offline";}
  render();
}
function loadLocal(){try{const r=localStorage.getItem("hb_local");return r?JSON.parse(r):null;}catch{return null;}}
function saveLocal(){try{localStorage.setItem("hb_local",JSON.stringify(getDataToSave()));}catch{}}

// ── Derived ────────────────────────────────────────────────────────────────
function derived(){
  const {entries,fixkosten,fMonth,fYear,categories} = state;
  const activeFix = fixkosten.filter(f=>fixActive(f,fMonth));
  const totalFix  = activeFix.reduce((s,f)=>s+fixMonthly(f),0);
  const mEntries  = entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===fMonth&&d.getFullYear()===fYear;});
  const totalInc  = mEntries.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0);
  const totalVar  = mEntries.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0);
  const totalExp  = totalVar+totalFix;
  const balance   = totalInc-totalExp;
  const catExp    = id=>mEntries.filter(e=>e.category===id&&e.type==="ausgabe").reduce((s,e)=>s+e.amount,0)+activeFix.filter(f=>f.category===id).reduce((s,f)=>s+fixMonthly(f),0);
  return {activeFix,totalFix,mEntries,totalInc,totalVar,totalExp,balance,catExp};
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById("app");
  const d   = derived();
  app.innerHTML = buildApp(d);
  attachEvents();
}

function buildApp(d){
  const {totalFix,totalInc,totalVar,totalExp,balance,mEntries,activeFix,catExp} = d;
  const showBackup = !state.lastBackup||(Date.now()-state.lastBackup)/86400000>=7;
  return `
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:20px 15px 17px;border-bottom:1px solid rgba(255,255,255,0.07)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-size:10px;letter-spacing:3px;color:#9ca3af;text-transform:uppercase;margin-bottom:3px">Haushaltsbuch</div>
        <div style="font-size:20px;font-weight:700">Familienfinanzen</div>
        <div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px">
          <div style="width:7px;height:7px;border-radius:99px;background:${state.fbStatus==="online"?"#4ade80":state.fbStatus==="connecting"?"#fbbf24":"#f87171"}"></div>
          <span style="color:${state.fbStatus==="online"?"#4ade80":state.fbStatus==="connecting"?"#fbbf24":"#f87171"}">${state.fbStatus==="online"?"Echtzeit-Sync aktiv":state.fbStatus==="connecting"?"Verbinde…":"Offline"}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <select id="selMonth" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">
          ${MONTHS.map((m,i)=>`<option value="${i}" ${i===state.fMonth?"selected":""}>${m}</option>`).join("")}
        </select>
        <select id="selYear" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">
          ${[2024,2025,2026,2027].map(y=>`<option value="${y}" ${y===state.fYear?"selected":""}>${y}</option>`).join("")}
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
      ${[{l:"Einnahmen",v:totalInc,c:"#4ade80"},{l:"Fixkosten",v:totalFix,c:"#a78bfa"},{l:"Variabel",v:totalVar,c:"#f87171"},{l:"Bilanz",v:balance,c:balance>=0?"#60a5fa":"#fb923c"}].map(x=>`
      <div style="background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 6px;border:1px solid ${x.c}25">
        <div style="font-size:9px;color:#9ca3af;margin-bottom:2px;letter-spacing:1px">${x.l.toUpperCase()}</div>
        <div style="font-size:12px;font-weight:700;color:${x.c}">${eur(x.v)}</div>
      </div>`).join("")}
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;background:#1a1a2e;border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto">
    ${[["dashboard","📊","Übersicht"],["fixkosten","📌","Fixkosten"],["kategorien","🗂️","Kategorien"],["eintraege","📋","Einträge"],["auswertung","📈","Trend"],["settings","⚙️","Einst."]].map(([id,ic,lb])=>`
    <button class="tab-btn ${state.tab===id?"active":""}" data-tab="${id}">${ic} ${lb}</button>`).join("")}
  </div>

  ${showBackup?`
  <div style="margin:10px 13px 0;background:#1e2d1e;border-radius:10px;padding:10px 12px;border:1px solid rgba(74,222,128,0.2);display:flex;align-items:center;gap:9px">
    <span style="font-size:18px">💾</span>
    <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#4ade80">Wöchentliche Sicherung fällig</div></div>
    <button id="btnBackup" style="background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer">💾 Jetzt</button>
    <button id="btnDismissBackup" style="background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer">×</button>
  </div>`:""}

  <div style="padding:13px">
  ${state.tab==="dashboard"?buildDashboard(d):""}
  ${state.tab==="fixkosten"?buildFixkosten(d):""}
  ${state.tab==="kategorien"?buildKategorien(d):""}
  ${state.tab==="eintraege"?buildEintraege(d):""}
  ${state.tab==="auswertung"?buildAuswertung(d):""}
  ${state.tab==="settings"?buildSettings():""}
  </div>

  <!-- FABs -->
  <div style="position:fixed;bottom:85px;right:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end">
    <button id="btnScan" style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:99px;padding:8px 14px;font-size:12px;cursor:pointer;box-shadow:0 3px 15px rgba(0,0,0,0.5)">📷 Scan</button>
    <button id="btnAddEntry" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:99px;padding:12px 19px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 15px rgba(59,130,246,0.4)">+ Eintrag</button>
  </div>
  <input id="fileInput" type="file" accept="image/*" style="display:none"/>

  <!-- Bottom Nav -->
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1a1a2e;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-around;padding:6px 0">
    ${[["dashboard","📊","Übersicht"],["fixkosten","📌","Fix"],["kategorien","🗂️","Kateg."],["eintraege","📋","Eintr."],["auswertung","📈","Trend"],["settings","⚙️","Einst."]].map(([id,ic,lb])=>`
    <button data-tab="${id}" style="background:none;border:none;color:${state.tab===id?"#60a5fa":"#6b7280"};display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:3px 4px">
      <span style="font-size:15px">${ic}</span><span style="font-size:9px">${lb}</span>
    </button>`).join("")}
  </div>

  ${buildModals(d)}
  `;
}

function buildDashboard(d){
  const {totalFix,totalVar,totalExp,catExp} = d;
  return `
  <div class="panel" style="margin-bottom:13px">
    <div style="font-size:12px;font-weight:600;margin-bottom:9px">📊 Fix vs. Variabel – ${MONTHS[state.fMonth]}</div>
    <div style="display:flex;gap:7px;margin-bottom:${totalExp>0?7:0}px">
      <div style="flex:1;background:rgba(167,139,250,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(167,139,250,0.2)">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:1px">📌 FIXKOSTEN</div>
        <div style="font-size:14px;font-weight:700;color:#a78bfa">${eur(totalFix)}</div>
        <div style="font-size:10px;color:#6b7280">${totalExp>0?Math.round(totalFix/totalExp*100):0}%</div>
      </div>
      <div style="flex:1;background:rgba(248,113,113,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(248,113,113,0.2)">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:1px">💸 VARIABEL</div>
        <div style="font-size:14px;font-weight:700;color:#f87171">${eur(totalVar)}</div>
        <div style="font-size:10px;color:#6b7280">${totalExp>0?Math.round(totalVar/totalExp*100):0}%</div>
      </div>
    </div>
    ${totalExp>0?`<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:6px;overflow:hidden;display:flex">
      <div style="width:${totalFix/totalExp*100}%;height:100%;background:#a78bfa"></div>
      <div style="width:${totalVar/totalExp*100}%;height:100%;background:#f87171"></div>
    </div>`:""}
  </div>
  <div style="font-size:12px;color:#9ca3af;margin-bottom:8px">Budgets – ${MONTHS[state.fMonth]} ${state.fYear}</div>
  ${state.categories.map(cat=>{
    const budget=state.budgets[cat.id]||0,spent=catExp(cat.id),over=budget>0&&spent>budget;
    return `<div class="panel" style="border:1px solid ${over?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.07)"}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${budget>0?6:0}px">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:17px">${cat.icon}</span>
          <span style="font-size:12px;font-weight:600">${cat.label}</span>
          ${over?`<span style="font-size:9px;background:rgba(248,113,113,0.2);color:#f87171;padding:1px 5px;border-radius:20px">ÜBERSCHRITTEN</span>`:""}
        </div>
        <div>
          <span style="font-size:12px;font-weight:700;color:${over?"#f87171":"#e8e6f0"}">${eur(spent)}</span>
          ${budget>0?`<span style="font-size:10px;color:#6b7280"> / ${eur(budget)}</span>`:""}
        </div>
      </div>
      ${budget>0?`<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:5px;overflow:hidden">
        <div style="width:${Math.min(spent/budget*100,100)}%;height:100%;background:${over?"#f87171":cat.color};border-radius:99px"></div>
      </div>`:""}
    </div>`;
  }).join("")}`;
}

function buildFixkosten(d){
  const {totalFix} = d;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <div style="font-size:14px;font-weight:700">📌 Fixkosten</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:2px">Aktiv ${MONTHS[state.fMonth]}: ${eur(totalFix)}</div>
    </div>
    <button id="btnNewFix" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:99px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer">+ Neu</button>
  </div>
  ${state.fixkosten.length===0?`<div style="text-align:center;padding:38px;color:#4b5563"><div style="font-size:34px;margin-bottom:7px">📌</div><div style="font-size:13px">Noch keine Fixkosten</div></div>`:""}
  ${RHYTHMUS.map(r=>{
    const items=state.fixkosten.filter(f=>f.rhythmus===r.id);
    if(!items.length) return "";
    return `<div style="margin-bottom:15px">
      <div style="font-size:10px;color:#9ca3af;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between">
        <span>${r.label.toUpperCase()}</span><span>${eur(items.reduce((s,f)=>s+f.amount,0))} ${r.short}</span>
      </div>
      ${items.map(fix=>{const cat=getCat(fix.category);const active=fixActive(fix,state.fMonth);return `
      <div class="panel" style="display:flex;align-items:center;gap:10px;opacity:${active?1:0.5}">
        <span style="font-size:18px">${cat?.icon||"📌"}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px">
            <span style="font-size:12px;font-weight:600">${fix.label}</span>
            ${active?`<span style="font-size:9px;background:rgba(74,222,128,0.1);color:#4ade80;padding:1px 4px;border-radius:9px">AKTIV</span>`:""}
          </div>
          <div style="font-size:10px;color:#6b7280">${cat?.label||""} · ${r.label}</div>
        </div>
        <div style="text-align:right;min-width:60px">
          <div style="font-size:13px;font-weight:700;color:#f87171">${eur(fix.amount)}</div>
          <div style="font-size:9px;color:#6b7280">${r.short}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button data-editfix="${fix.id}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer">✏️</button>
          <button data-delfix="${fix.id}" style="background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);color:#f87171;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer">🗑️</button>
        </div>
      </div>`;}).join("")}
    </div>`;
  }).join("")}
  ${state.fixkosten.length>0?`
  <div style="background:linear-gradient(135deg,#1a1a2e,#1e1a2e);border-radius:12px;padding:12px;border:1px solid rgba(167,139,250,0.2)">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:#a78bfa">💜 Jahresübersicht</div>
    ${RHYTHMUS.map(r=>{const items=state.fixkosten.filter(f=>f.rhythmus===r.id);if(!items.length)return"";return`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#9ca3af">${r.label}</span><span style="font-size:11px;font-weight:600">${eur(items.reduce((s,f)=>s+fixYearly(f),0))}/Jahr</span></div>`;}).join("")}

function buildAuswertung(d){
  const {totalFix,totalVar,totalExp,totalInc,balance} = d;
  const yearData=MONTHS.map((m,i)=>{
    const me=state.entries.filter(e=>{const dt=new Date(e.date);return dt.getMonth()===i&&dt.getFullYear()===state.fYear;});
    const fM=state.fixkosten.filter(f=>fixActive(f,i)).reduce((s,f)=>s+fixMonthly(f),0);
    return{m,vr:me.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0),fx:fM,inc:me.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0)};
  });
  const maxY=Math.max(...yearData.map(d=>Math.max(d.vr+d.fx,d.inc)),1);
  const sf=state.ausFilt!=="variabel",sv=state.ausFilt!=="fix";
  return `
  <div style="font-size:12px;color:#9ca3af;margin-bottom:10px">Jahrestrend ${state.fYear}</div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    ${[["alle","Alle"],["fix","📌 Fix"],["variabel","💸 Variabel"]].map(([id,lb])=>`
    <button data-ausfilt="${id}" style="flex:1;background:${state.ausFilt===id?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.05)"};border:1px solid ${state.ausFilt===id?"#3b82f6":"rgba(255,255,255,0.1)"};color:${state.ausFilt===id?"#60a5fa":"#9ca3af"};border-radius:9px;padding:7px 3px;font-size:11px;font-weight:${state.ausFilt===id?700:400};cursor:pointer">${lb}</button>`).join("")}
  </div>
  <div style="background:#1a1a2e;border-radius:12px;padding:13px;margin-bottom:12px">
    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      ${sf?`<div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#a78bfa"></div><span style="font-size:10px;color:#9ca3af">Fix</span></div>`:""}
      ${sv?`<div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#f87171"></div><span style="font-size:10px;color:#9ca3af">Variabel</span></div>`:""}
      <div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:2px;background:#4ade80"></div><span style="font-size:10px;color:#9ca3af">Einnahmen</span></div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:110px">
      ${yearData.map(dd=>{
        const tot=(sf?dd.fx:0)+(sv?dd.vr:0);
        const incH=Math.round(dd.inc/maxY*100),totH=Math.round(tot/maxY*100);
        const fxH=tot>0?Math.round(dd.fx/tot*100):0,vrH=tot>0?Math.round(dd.vr/tot*100):0;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%">
          <div style="flex:1;width:100%;position:relative">
            <div style="position:absolute;bottom:0;left:5%;width:42%;height:${incH}%;background:#4ade80;border-radius:3px 3px 0 0;min-height:${dd.inc>0?2:0}px"></div>
            <div style="position:absolute;bottom:0;right:5%;width:42%;height:${totH}%;border-radius:3px 3px 0 0;overflow:hidden;min-height:${tot>0?2:0}px;display:flex;flex-direction:column-reverse">
              ${sv?`<div style="width:100%;height:${vrH}%;background:#f87171;min-height:${dd.vr>0?2:0}px"></div>`:""}
              ${sf?`<div style="width:100%;height:${fxH}%;background:#a78bfa;min-height:${dd.fx>0?2:0}px"></div>`:""}
            </div>
          </div>
          <div style="font-size:8px;color:#6b7280;margin-top:3px">${dd.m}</div>
        </div>`;
      }).join("")}
    </div>
  </div>
  <div class="panel" style="margin-bottom:9px">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">${MONTHS[state.fMonth]} ${state.fYear} – Zusammenfassung</div>
    ${[{l:"📌 Fixkosten",v:totalFix,c:"#a78bfa"},{l:"💸 Variabel",v:totalVar,c:"#f87171"},{l:"📊 Gesamt",v:totalExp,c:"#e8e6f0"},{l:"💰 Einnahmen",v:totalInc,c:"#4ade80"},{l:"💼 Bilanz",v:balance,c:balance>=0?"#60a5fa":"#fb923c"}].map(r=>`
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:11px;color:#9ca3af">${r.l}</span>
      <span style="font-size:12px;font-weight:600;color:${r.c}">${eur(r.v)}</span>
    </div>`).join("")}
  </div>
  ${state.persons.map(p=>{
    const pe=d.mEntries.filter(e=>e.person===p);
    const inc=pe.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0);
    const exp=pe.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0);
    if(!pe.length) return "";
    return `<div class="panel"><div style="font-size:12px;font-weight:600;margin-bottom:6px">👤 ${p}</div>
    <div style="display:flex;gap:12px">
      <div><div style="font-size:9px;color:#9ca3af">Einnahmen</div><div style="font-size:12px;font-weight:600;color:#4ade80">${eur(inc)}</div></div>
      <div><div style="font-size:9px;color:#9ca3af">Variabel</div><div style="font-size:12px;font-weight:600;color:#f87171">${eur(exp)}</div></div>
      <div><div style="font-size:9px;color:#9ca3af">Bilanz</div><div style="font-size:12px;font-weight:600;color:${inc-exp>=0?"#60a5fa":"#fb923c"}">${eur(inc-exp)}</div></div>
    </div></div>`;
  }).join("")}`;
}

        <button id="btnCloseCat" style="background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:99px;width:28px;height:28px;cursor:pointer;font-size:15px">×</button>
      </div>
      <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 14px;margin-bottom:16px;border:1px solid ${c.color}40">
        <div style="font-size:30px">${c.icon}</div>
        <div><div style="font-size:15px;font-weight:700;color:${c.color}">${c.label||"Vorschau"}</div></div>
      </div>
      <div class="lbl" style="margin-top:0">NAME</div>
      <input id="catLabel" value="${c.label}" placeholder="z.B. Haustier…" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px;color:#fff;font-size:13px;margin-bottom:12px"/>
      <div class="lbl">ICON</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
        ${EMOJIS.map(e=>`<button data-catemoji="${e}" style="width:38px;height:38px;font-size:19px;background:${c.icon===e?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.06)"};border:${c.icon===e?"2px solid #60a5fa":"1px solid rgba(255,255,255,0.1)"};border-radius:9px;cursor:pointer">${e}</button>`).join("")}
      </div>
      <div class="lbl">FARBE</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px">
        ${COLORS.map(col=>`<button data-catcolor="${col}" style="width:32px;height:32px;background:${col};border:${c.color===col?"3px solid #fff":"2px solid transparent"};border-radius:99px;cursor:pointer;box-shadow:${c.color===col?`0 0 8px ${col}`:"none"}"></button>`).join("")}
      </div>
      <button id="btnSaveCat" style="width:100%;background:${c.label.trim()?"linear-gradient(135deg,#3b82f6,#8b5cf6)":"rgba(255,255,255,0.07)"};border:none;color:#fff;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;opacity:${c.label.trim()?1:0.4}">
        ${state.editCat?.id?"Speichern":"Erstellen"}
      </button>
    </div></div>`;
  }

  // Fix editor
  if(state.editFix!==null){
    const f=state.fixEditor;
    html+=`<div class="sheet-overlay" id="fixOverlay">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div style="font-size:16px;font-weight:700">${state.editFix?.id?"✏️ Fixkosten bearbeiten":"➕ Neue Fixkosten"}</div>
        <button id="btnCloseFix" style="background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:99px;width:28px;height:28px;cursor:pointer;font-size:15px">×</button>
      </div>
      <div class="lbl" style="margin-top:0">BEZEICHNUNG</div>
      <input id="fixLabel" value="${f.label}" placeholder="z.B. Miete, Netflix…" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px;color:#fff;font-size:13px;margin-bottom:10px"/>
      <div class="lbl" style="margin-top:0">BETRAG (€)</div>
      <input id="fixAmount" type="number" value="${f.amount}" placeholder="0.00" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px;color:#fff;font-size:19px;font-weight:700;margin-bottom:10px"/>
      <div class="lbl" style="margin-top:0">RHYTHMUS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px">
        ${RHYTHMUS.map(r=>`<button data-fixrhythmuseditor="${r.id}" style="background:${f.rhythmus===r.id?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.05)"};border:1px solid ${f.rhythmus===r.id?"#3b82f6":"rgba(255,255,255,0.1)"};color:${f.rhythmus===r.id?"#60a5fa":"#9ca3af"};border-radius:9px;padding:9px;cursor:pointer;font-size:12px;font-weight:${f.rhythmus===r.id?700:400}">${r.label}</button>`).join("")}
      </div>
      <div class="lbl" style="margin-top:0">KATEGORIE</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
        ${state.categories.map(cat=>`<button data-fixcatid="${cat.id}" style="background:${f.catId===cat.id?cat.color+"25":"rgba(255,255,255,0.05)"};border:1px solid ${f.catId===cat.id?cat.color:"rgba(255,255,255,0.1)"};color:${f.catId===cat.id?cat.color:"#9ca3af"};border-radius:7px;padding:5px 9px;cursor:pointer;font-size:11px">${cat.icon} ${cat.label}</button>`).join("")}
      </div>
      <div class="lbl" style="margin-top:0">STARTDATUM</div>
      <input id="fixStart" type="date" value="${f.startDate}" style="width:100%;background:#0f0f13;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px;color:#fff;font-size:12px;margin-bottom:20px"/>
      <button id="btnSaveFix" style="width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">
        ${state.editFix?.id?"Änderungen speichern":"Fixkosten hinzufügen"}
      </button>
    </div></div>`;
  }

  // Confirm delete cat
  if(state.delCat){
    html+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px">
    <div style="background:#1a1a2e;border-radius:16px;padding:20px;width:100%;max-width:290px;border:1px solid rgba(248,113,113,0.25)">
      <div style="font-size:28px;text-align:center;margin-bottom:9px">${state.delCat.icon}</div>
      <div style="font-size:14px;font-weight:700;text-align:center;margin-bottom:6px">Kategorie löschen?</div>
      <div style="font-size:12px;color:#9ca3af;text-align:center;margin-bottom:16px">„${state.delCat.label}" wird entfernt.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button id="btnCancelDel" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:9px;padding:10px;font-size:12px;cursor:pointer">Abbrechen</button>
        <button id="btnConfirmDel" style="background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.4);color:#f87171;border-radius:9px;padding:10px;font-size:12px;font-weight:700;cursor:pointer">Löschen</button>
      </div>
    </div></div>`;
  }

  return html;
}

// ── Event Handling ─────────────────────────────────────────────────────────
function attachEvents(){
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.tab=btn.dataset.tab;render();});
  });

  // Month/Year selects
  const sm=document.getElementById("selMonth");
  if(sm) sm.addEventListener("change",()=>{state.fMonth=+sm.value;render();});
  const sy=document.getElementById("selYear");
  if(sy) sy.addEventListener("change",()=>{state.fYear=+sy.value;render();});

  // Add entry button
  const btnAdd=document.getElementById("btnAddEntry");
  if(btnAdd) btnAdd.addEventListener("click",()=>{state.modal="add";state.scanMsg="";render();});

  // Scan button
  const btnScan=document.getElementById("btnScan");
  if(btnScan) btnScan.addEventListener("click",()=>document.getElementById("fileInput")?.click());
  const fi=document.getElementById("fileInput");
  if(fi) fi.addEventListener("change",handleScan);

  // Close modal
  const btnClose=document.getElementById("btnCloseModal");
  if(btnClose) btnClose.addEventListener("click",()=>{state.modal=null;render();});
  const overlay=document.getElementById("modalOverlay");
  if(overlay) overlay.addEventListener("click",e=>{if(e.target===overlay){state.modal=null;render();}});

  // Type selector in modal
  document.querySelectorAll("[data-type]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.form.type=btn.dataset.type;syncFormFromInputs();render();});
  });

  // Fix rhythmus in modal
  document.querySelectorAll("[data-fixrhythmus]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.form.fixRhythmus=btn.dataset.fixrhythmus;syncFormFromInputs();render();});
  });

  // Cat id in modal
  document.querySelectorAll("[data-catid]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.form.catId=btn.dataset.catid;syncFormFromInputs();render();});
  });

  // Amount/note/date live sync
  const inpAmount=document.getElementById("inpAmount");
  if(inpAmount) inpAmount.addEventListener("input",()=>{state.form.amount=inpAmount.value;render();});
  const inpNote=document.getElementById("inpNote");
  if(inpNote) inpNote.addEventListener("input",()=>{state.form.note=inpNote.value;});
  const inpDate=document.getElementById("inpDate");
  if(inpDate) inpDate.addEventListener("change",()=>{state.form.date=inpDate.value;});
  const selPerson=document.getElementById("selPerson");
  if(selPerson) selPerson.addEventListener("change",()=>{state.form.person=selPerson.value;});

  // Save entry
  const btnSave=document.getElementById("btnSaveEntry");
  if(btnSave) btnSave.addEventListener("click",()=>{
    syncFormFromInputs();
    const f=state.form;
    if(!f.amount||isNaN(+f.amount)) return;
    if(f.type==="fixkosten"){
      const cat=getCat(f.catId);
      state.fixkosten=[...state.fixkosten,{id:genId(),label:f.note||cat?.label||"Fix",amount:+f.amount,rhythmus:f.fixRhythmus,category:f.catId,startDate:f.date}];
    } else {
      state.entries=[{id:Date.now(),type:f.type,category:f.catId,amount:+f.amount,person:f.person,note:f.note,date:f.date},...state.entries];
    }
    state.form={...f,amount:"",note:"",date:today()};
    state.modal=null;
    saveToFirebase();
    render();
  });

  // Delete entry
  document.querySelectorAll("[data-delentry]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.entries=state.entries.filter(e=>e.id!=btn.dataset.delentry);saveToFirebase();render();});
  });

  // New fix
  const btnNewFix=document.getElementById("btnNewFix");
  if(btnNewFix) btnNewFix.addEventListener("click",()=>{state.editFix={};state.fixEditor={label:"",amount:"",rhythmus:"monatlich",catId:state.categories[0]?.id||"",startDate:today()};render();});

  // Edit fix
  document.querySelectorAll("[data-editfix]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const fix=state.fixkosten.find(f=>f.id===btn.dataset.editfix);
      if(fix){state.editFix=fix;state.fixEditor={label:fix.label,amount:fix.amount.toString(),rhythmus:fix.rhythmus,catId:fix.category,startDate:fix.startDate||today()};}
      render();
    });
  });

  // Delete fix
  document.querySelectorAll("[data-delfix]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.fixkosten=state.fixkosten.filter(f=>f.id!==btn.dataset.delfix);saveToFirebase();render();});
  });

  // Fix editor events
  const btnCloseFix=document.getElementById("btnCloseFix");
  if(btnCloseFix) btnCloseFix.addEventListener("click",()=>{state.editFix=null;render();});
  const fixOverlay=document.getElementById("fixOverlay");
  if(fixOverlay) fixOverlay.addEventListener("click",e=>{if(e.target===fixOverlay){state.editFix=null;render();}});
  document.querySelectorAll("[data-fixrhythmuseditor]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.fixEditor.rhythmus=btn.dataset.fixrhythmuseditor;render();});
  });
  document.querySelectorAll("[data-fixcatid]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.fixEditor.catId=btn.dataset.fixcatid;render();});
  });
  const btnSaveFix=document.getElementById("btnSaveFix");
  if(btnSaveFix) btnSaveFix.addEventListener("click",()=>{
    const fl=document.getElementById("fixLabel")?.value||"";
    const fa=document.getElementById("fixAmount")?.value||"";
    const fs=document.getElementById("fixStart")?.value||today();
    if(!fl.trim()||!fa||isNaN(+fa)) return;
    const fix={...state.editFix,id:state.editFix?.id||genId(),label:fl.trim(),amount:+fa,rhythmus:state.fixEditor.rhythmus,category:state.fixEditor.catId,startDate:fs};
    state.fixkosten=state.fixkosten.find(x=>x.id===fix.id)?state.fixkosten.map(x=>x.id===fix.id?fix:x):[...state.fixkosten,fix];
    state.editFix=null;
    saveToFirebase();render();
  });

  // New cat
  const btnNewCat=document.getElementById("btnNewCat");
  if(btnNewCat) btnNewCat.addEventListener("click",()=>{state.editCat={};state.catEditor={label:"",icon:"🎯",color:"#60a5fa"};render();});

  // Edit cat
  document.querySelectorAll("[data-editcat]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const cat=state.categories.find(c=>c.id===btn.dataset.editcat);
      if(cat){state.editCat=cat;state.catEditor={label:cat.label,icon:cat.icon,color:cat.color};}
      render();
    });
  });

  // Cat editor events
  const btnCloseCat=document.getElementById("btnCloseCat");
  if(btnCloseCat) btnCloseCat.addEventListener("click",()=>{state.editCat=null;render();});
  const catOverlay=document.getElementById("catOverlay");
  if(catOverlay) catOverlay.addEventListener("click",e=>{if(e.target===catOverlay){state.editCat=null;render();}});
  document.querySelectorAll("[data-catemoji]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.catEditor.icon=btn.dataset.catemoji;render();});
  });
  document.querySelectorAll("[data-catcolor]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.catEditor.color=btn.dataset.catcolor;render();});
  });
  const catLabel=document.getElementById("catLabel");
  if(catLabel) catLabel.addEventListener("input",()=>{state.catEditor.label=catLabel.value;render();});
  const btnSaveCat=document.getElementById("btnSaveCat");
  if(btnSaveCat) btnSaveCat.addEventListener("click",()=>{
    if(!state.catEditor.label.trim()) return;
    const cat={...state.editCat,label:state.catEditor.label.trim(),icon:state.catEditor.icon,color:state.catEditor.color,id:state.editCat?.id||genId()};
    state.categories=state.categories.find(c=>c.id===cat.id)?state.categories.map(c=>c.id===cat.id?cat:c):[...state.categories,cat];
    if(!state.budgets[cat.id]) state.budgets={...state.budgets,[cat.id]:0};
    state.editCat=null;
    saveToFirebase();render();
  });

  // Delete cat
  document.querySelectorAll("[data-delcat]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.delCat=state.categories.find(c=>c.id===btn.dataset.delcat)||null;render();});
  });
  const btnCancelDel=document.getElementById("btnCancelDel");
  if(btnCancelDel) btnCancelDel.addEventListener("click",()=>{state.delCat=null;render();});
  const btnConfirmDel=document.getElementById("btnConfirmDel");
  if(btnConfirmDel) btnConfirmDel.addEventListener("click",()=>{
    if(state.delCat){state.categories=state.categories.filter(c=>c.id!==state.delCat.id);delete state.budgets[state.delCat.id];state.delCat=null;}
    saveToFirebase();render();
  });

  // Persons
  document.querySelectorAll("[data-personidx]").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const i=+inp.dataset.personidx,newName=inp.value;
      const old=state.persons[i];
      state.persons=state.persons.map((p,j)=>j===i?newName:p);
      state.entries=state.entries.map(e=>e.person===old?{...e,person:newName}:e);
      saveToFirebase();
    });
  });
  document.querySelectorAll("[data-delperson]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.persons=state.persons.filter((_,j)=>j!==+btn.dataset.delperson);saveToFirebase();render();});
  });
  const btnAddPerson=document.getElementById("btnAddPerson");
  if(btnAddPerson) btnAddPerson.addEventListener("click",()=>{state.persons=[...state.persons,"Neue Person"];saveToFirebase();render();});

  // Budgets
  document.querySelectorAll("[data-budget]").forEach(inp=>{
    inp.addEventListener("change",()=>{state.budgets={...state.budgets,[inp.dataset.budget]:+inp.value};saveToFirebase();});
  });

  // Auswertung filter
  document.querySelectorAll("[data-ausfilt]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.ausFilt=btn.dataset.ausfilt;render();});
  });

  // Backup
  const btnBackup=document.getElementById("btnBackup");
  if(btnBackup) btnBackup.addEventListener("click",doBackup);
  const btnDismiss=document.getElementById("btnDismissBackup");
  if(btnDismiss) btnDismiss.addEventListener("click",()=>{state.lastBackup=Date.now();saveToFirebase();render();});
  const btnBackup2=document.getElementById("btnBackup2");
  if(btnBackup2) btnBackup2.addEventListener("click",doBackup);

  // CSV / Print
  const btnCSV=document.getElementById("btnCSV");
  if(btnCSV) btnCSV.addEventListener("click",doCSV);
  const btnPrint=document.getElementById("btnPrint");
  if(btnPrint) btnPrint.addEventListener("click",()=>window.print());

  // Export modal
  const btnCloseExp=document.getElementById("btnCloseExp");
  if(btnCloseExp) btnCloseExp.addEventListener("click",()=>{state.expModal=null;render();});
  const expOverlay=document.getElementById("expOverlay");
  if(expOverlay) expOverlay.addEventListener("click",e=>{if(e.target===expOverlay){state.expModal=null;render();}});
  const btnCopyExp=document.getElementById("btnCopyExp");
  if(btnCopyExp) btnCopyExp.addEventListener("click",()=>{
    const ta=document.querySelector("#expOverlay textarea");
    if(ta){navigator.clipboard.writeText(ta.value).catch(()=>{ta.select();document.execCommand("copy");});}
    state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
  });
}

function syncFormFromInputs(){
  const a=document.getElementById("inpAmount");if(a)state.form.amount=a.value;
  const n=document.getElementById("inpNote");if(n)state.form.note=n.value;
  const dt=document.getElementById("inpDate");if(dt)state.form.date=dt.value;
  const p=document.getElementById("selPerson");if(p)state.form.person=p.value;
}

// ── Export helpers ─────────────────────────────────────────────────────────
function doBackup(){
  const content=JSON.stringify({entries:state.entries,fixkosten:state.fixkosten,categories:state.categories,persons:state.persons,budgets:state.budgets,exportedAt:new Date().toISOString()},null,2);
  state.expModal={title:"💾 Backup (JSON)",content,hint:"Kopiere den Text und speichere ihn als .json Datei."};
  state.lastBackup=Date.now();saveToFirebase();render();
}
function doCSV(){
  const sep=";";
  const allCats=[...state.categories,INCOME_CAT];
  const hdr=["Datum","Typ","Kategorie","Person","Betrag","Notiz"].join(sep);
  const eL=state.entries.map(e=>{const c=allCats.find(x=>x.id===e.category);const b=(e.type==="einnahme"?e.amount:-e.amount).toFixed(2).replace(".",",");return[e.date,e.type==="einnahme"?"Einnahme":"Ausgabe",c?.label||e.category,e.person,b,`"${e.note||""}"`].join(sep);});
  const fL=state.fixkosten.map(f=>{const c=state.categories.find(x=>x.id===f.category);const b=(-f.amount).toFixed(2).replace(".",",");return[f.startDate||"","Fixkosten",c?.label||f.category,"–",b,`"${f.label} (${RHYTHMUS.find(r=>r.id===f.rhythmus)?.label})"`].join(sep);});
  const blank=["","","","","",""].join(sep);
  const sH=["Monat","Einnahmen","Variabel","Fixkosten","Gesamt","Bilanz"].join(sep);
  const sL=MONTHS.map((m,i)=>{const me=state.entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===i&&d.getFullYear()===state.fYear;});const fM=state.fixkosten.filter(f=>fixActive(f,i)).reduce((s,f)=>s+fixMonthly(f),0);const inc=me.filter(e=>e.type==="einnahme").reduce((s,e)=>s+e.amount,0);const vr=me.filter(e=>e.type==="ausgabe").reduce((s,e)=>s+e.amount,0);return[`${m} ${state.fYear}`,inc.toFixed(2).replace(".",","),vr.toFixed(2).replace(".",","),fM.toFixed(2).replace(".",","),(vr+fM).toFixed(2).replace(".",","),(inc-vr-fM).toFixed(2).replace(".",",")].join(sep);});
  const content=[hdr,...eL,...fL,blank,"=== MONATSÜBERSICHT ===",sH,...sL].join("\n");
  state.expModal={title:"📊 CSV für Excel",content,hint:"Kopiere → Excel öffnen → Zelle A1 → Einfügen."};
  render();
}

// ── Scan ───────────────────────────────────────────────────────────────────
async function handleScan(e){
  const file=e.target.files[0];if(!file)return;e.target.value="";
  state.modal="scan";state.scanMsg="⏳ KI analysiert…";render();
  const catIds=state.categories.map(c=>c.id).join(", ");
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:reader.result.split(",")[1]}},{type:"text",text:`Kassenbon: Betrag, Kategorie (aus: ${catIds}), Datum (YYYY-MM-DD), Händler. NUR JSON: {"amount":number,"category":"...","date":"...","note":"..."}`}]}]})});
      const data=await res.json();
      const p=JSON.parse((data.content?.map(i=>i.text||"").join("")||"").replace(/```json|```/g,"").trim());
      state.form.amount=p.amount?.toString()||"";
      state.form.catId=state.categories.find(c=>c.id===p.category)?.id||state.categories[0]?.id;
      state.form.note=p.note||"";
      state.form.date=p.date||today();
      state.form.type="ausgabe";
      state.scanMsg="✅ Erkannt! Bitte prüfen und speichern.";
    }catch{state.scanMsg="⚠️ Nicht erkannt – bitte manuell eingeben.";}
    render();
  };
  reader.readAsDataURL(file);
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
// Load local first for instant display
const localData=loadLocal();
if(localData){Object.assign(state,{entries:localData.entries||[],fixkosten:localData.fixkosten||[],categories:localData.categories||DEFAULT_CATS,persons:localData.persons||["Gemeinsam","Partner 1","Partner 2"],budgets:localData.budgets||DEFAULT_BUDGETS,lastBackup:localData.lastBackup||null});}

// Then connect Firebase real-time
document.getElementById("loading").style.display="flex";
document.getElementById("app").classList.add("hidden");

DOC.onSnapshot(snap=>{
  if(snap.exists){
    const data=snap.data();
    delete data.updatedAt;
    Object.assign(state,data);
    saveLocal();
  }
  state.fbStatus="online";
  document.getElementById("loading").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  render();
},err=>{
  console.warn("Firebase:",err);
  state.fbStatus="offline";
  document.getElementById("loading").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  render();
});
</script>
