<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Familienfinanzen</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;color:#e8e6f0;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:flex-end;z-index:200}
.sheet{border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto}
.panel{border-radius:12px;padding:12px 14px;margin-bottom:10px}
.lbl{font-size:11px;color:#9ca3af;margin-bottom:5px;margin-top:10px;letter-spacing:1px;display:block}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

// ── Themes ─────────────────────────────────────────────────────────────────
var THEMES={
  dunkel:{name:"Dunkel (Standard)",bg:"#0f0f13",card:"#1a1a2e",cardBorder:"rgba(255,255,255,0.07)",header:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",accent:"#60a5fa"},
  schwarz:{name:"Reines Schwarz",bg:"#000000",card:"#111111",cardBorder:"rgba(255,255,255,0.08)",header:"linear-gradient(135deg,#111,#1a1a1a,#222)",accent:"#60a5fa"},
  lila:{name:"Lila Nacht",bg:"#0d0b1a",card:"#1a1530",cardBorder:"rgba(167,139,250,0.12)",header:"linear-gradient(135deg,#1a1530,#231a40,#2d1b5e)",accent:"#a78bfa"},
  gruen:{name:"Dunkelgruen",bg:"#0a130d",card:"#0f1f14",cardBorder:"rgba(74,222,128,0.1)",header:"linear-gradient(135deg,#0f1f14,#122b1a,#163520)",accent:"#4ade80"},
  marine:{name:"Marine Blau",bg:"#070d1a",card:"#0d1b2e",cardBorder:"rgba(96,165,250,0.1)",header:"linear-gradient(135deg,#0d1b2e,#0f2540,#112e52)",accent:"#38bdf8"},
  rot:{name:"Dunkelrot",bg:"#130a0a",card:"#1f0f0f",cardBorder:"rgba(248,113,113,0.1)",header:"linear-gradient(135deg,#1f0f0f,#2d1212,#3a1515)",accent:"#f87171"},
};
var T=THEMES.dunkel; // current theme, updated on load

var MONTHS=["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
var COLORS=["#4ade80","#60a5fa","#f472b6","#a78bfa","#fb923c","#34d399","#f87171","#fbbf24","#38bdf8","#e879f9","#84cc16","#f97316","#06b6d4","#ec4899","#8b5cf6","#14b8a6"];
var RHYTHMUS=[{id:"monatlich",label:"Monatlich",short:"mtl."},{id:"woechentlich",label:"Woechentlich",short:"woech."},{id:"quartalsweise",label:"Quartalsweise",short:"Quartal"},{id:"jaehrlich",label:"Jaehrlich",short:"jaehrl."}];
var DEFAULT_CATS=[
  {id:"lebensmittel",label:"Lebensmittel",icon:"&#128722;",color:"#4ade80"},
  {id:"miete",label:"Miete/Wohnen",icon:"&#127968;",color:"#60a5fa"},
  {id:"freizeit",label:"Freizeit",icon:"&#127918;",color:"#f472b6"},
  {id:"versicherung",label:"Versicherungen",icon:"&#128737;",color:"#a78bfa"},
  {id:"transport",label:"Auto/Transport",icon:"&#128663;",color:"#fb923c"},
  {id:"urlaub",label:"Urlaub",icon:"&#9992;",color:"#34d399"},
  {id:"gesundheit",label:"Gesundheit",icon:"&#128138;",color:"#f87171"},
  {id:"restaurant",label:"Restaurants",icon:"&#127374;",color:"#fbbf24"}
];
var INCOME_CAT={id:"einnahmen",label:"Einnahmen",icon:"&#128176;",color:"#86efac"};
var ICONS=["&#128722;","&#127968;","&#127918;","&#128737;","&#128663;","&#9992;","&#128138;","&#127374;","&#128176;","&#127891;","&#128118;","&#128062;","&#128132;","&#127925;","&#128241;","&#127947;","&#127807;","&#128295;","&#127873;","&#127974;","&#127850;","&#128652;","&#128161;","&#128234;","&#128247;","&#129529;","&#128085;","&#128054;","&#9917;","&#127928;","&#128736;"];

var DEFAULT_DATA={
  entries:[],fixkosten:[],trash:[],
  categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),
  persons:["Gemeinsam","Partner 1","Partner 2"],
  budgets:{lebensmittel:600,miete:1200,freizeit:200,versicherung:150,transport:250,urlaub:300,gesundheit:100,restaurant:150},
  lastBackup:null,theme:"dunkel"
};

var S={
  data:loadData(),
  tab:"dashboard",fMonth:new Date().getMonth(),fYear:new Date().getFullYear(),
  modal:null,editCat:null,editFix:null,editEntry:null,
  delCat:null,expModal:null,
  catDetailId:null,headerDetail:null,trendDetail:null,
  showTrash:false,
  ausFilt:"alle",ausPerson:"alle",
  search:"",sortBy:"datum",sortDir:"desc",
  filterPerson:"alle",filterType:"alle",filterCat:"alle",
  copied:false,viewPhoto:null,fbStatus:"offline",
  form:{type:"ausgabe",catId:"lebensmittel",amount:"",person:"Gemeinsam",note:"",date:tod(),fixRhythmus:"monatlich",photo:null,recurring:false},
  catEd:{label:"",icon:"&#127891;",color:"#60a5fa"},
  fixEd:{label:"",amount:"",rhythmus:"monatlich",catId:"lebensmittel",startDate:tod(),isIncome:false,person:"Gemeinsam"}
};

var fbDoc=null,fbSaving=false;

function tod(){return new Date().toISOString().slice(0,10);}
function eur(n){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0);}
function gid(){return "x"+Date.now()+Math.random().toString(36).slice(2,6);}
function h(s){return String(s||"").replace(/&(?!#)/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ph(s){return String(s||"");}

function loadData(){
  try{
    var r=localStorage.getItem("hb3");
    var d=r?Object.assign(JSON.parse(JSON.stringify(DEFAULT_DATA)),JSON.parse(r)):JSON.parse(JSON.stringify(DEFAULT_DATA));
    if(!d.trash)d.trash=[];
    if(!d.theme)d.theme="dunkel";
    return d;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_DATA));}
}
function saveLocal(){
  try{localStorage.setItem("hb3",JSON.stringify({entries:S.data.entries,fixkosten:S.data.fixkosten,trash:S.data.trash||[],categories:S.data.categories,persons:S.data.persons,budgets:S.data.budgets,lastBackup:S.data.lastBackup,theme:S.data.theme}));}catch(e){}
}
function saveData(){
  saveLocal();
  if(fbDoc&&S.fbStatus==="online"){
    fbSaving=true;
    var d={entries:S.data.entries,fixkosten:S.data.fixkosten,trash:S.data.trash||[],categories:S.data.categories,persons:S.data.persons,budgets:S.data.budgets,lastBackup:S.data.lastBackup,theme:S.data.theme};
    fbDoc.set(d).then(function(){fbSaving=false;}).catch(function(e){console.warn(e);fbSaving=false;});
  }
}

function applyTheme(){T=THEMES[S.data.theme]||THEMES.dunkel;document.body.style.background=T.bg;}

function initFirebase(){
  try{
    firebase.initializeApp({apiKey:"AIzaSyB15aAsNolTaEbvjGLZQudmZvID69jePjc",authDomain:"haushaltsbuch-ba7ff.firebaseapp.com",projectId:"haushaltsbuch-ba7ff",storageBucket:"haushaltsbuch-ba7ff.firebasestorage.app",messagingSenderId:"902171941871",appId:"1:902171941871:web:d349425550f2e47a3af41a"});
    var db=firebase.firestore();fbDoc=db.collection("haushaltsbuch").doc("shared");
    fbDoc.onSnapshot(function(snap){
      if(snap.exists&&!fbSaving){var d=snap.data();delete d.updatedAt;if(!d.trash)d.trash=[];if(!d.theme)d.theme="dunkel";S.data=Object.assign(JSON.parse(JSON.stringify(DEFAULT_DATA)),d);applyTheme();saveLocal();render();}
      S.fbStatus="online";render();
    },function(err){console.warn(err);S.fbStatus="offline";render();});
  }catch(e){console.warn(e);S.fbStatus="offline";}
}

function fixActive(fix,month){
  if(fix.rhythmus==="monatlich"||fix.rhythmus==="woechentlich")return true;
  if(fix.rhythmus==="quartalsweise"){var sm=fix.startDate?new Date(fix.startDate).getMonth():0;return(month-sm+12)%3===0;}
  if(fix.rhythmus==="jaehrlich"){return fix.startDate?new Date(fix.startDate).getMonth()===month:true;}
  return false;
}
function fixMo(fix){return fix.rhythmus==="woechentlich"?fix.amount*4.33:fix.amount;}
function fixYr(fix){return fix.rhythmus==="monatlich"?fix.amount*12:fix.rhythmus==="woechentlich"?fix.amount*52:fix.rhythmus==="quartalsweise"?fix.amount*4:fix.amount;}
function fixEst(amt,rhy){return rhy==="woechentlich"?amt*4.33:rhy==="quartalsweise"?amt/3:rhy==="jaehrlich"?amt/12:amt;}
function getCat(id){var all=S.data.categories.concat([INCOME_CAT]);for(var i=0;i<all.length;i++){if(all[i].id===id)return all[i];}return S.data.categories[0]||DEFAULT_CATS[0];}

function calc(){
  var d=S.data,fm=S.fMonth,fy=S.fYear;
  var aFix=d.fixkosten.filter(function(f){return fixActive(f,fm);});
  var aFixExp=aFix.filter(function(f){return !f.isIncome;});
  var aFixInc=aFix.filter(function(f){return f.isIncome;});
  var tFix=aFixExp.reduce(function(s,f){return s+fixMo(f);},0);
  var tFixInc=aFixInc.reduce(function(s,f){return s+fixMo(f);},0);
  var mE=d.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===fm&&dt.getFullYear()===fy;});
  var tInc=mE.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){{return s+e.amount;}},0)+tFixInc;
  var tVar=mE.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);
  var tExp=tVar+tFix;
  return{aFix:aFixExp,aFixInc:aFixInc,tFix:tFix,tFixInc:tFixInc,mE:mE,tInc:tInc,tVar:tVar,tExp:tExp,bal:tInc-tExp};
}
function catExp(id,c){
  return c.mE.filter(function(e){return e.category===id&&e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0)+
         c.aFix.filter(function(f){return f.category===id;}).reduce(function(s,f){return s+fixMo(f);},0);
}

function render(){applyTheme();document.getElementById("app").innerHTML=buildHTML(calc());bind();}

function panel(content,style){return'<div class="panel" style="background:'+T.card+';border:1px solid '+T.cardBorder+';'+(style||"")+'">'+content+'</div>';}
function sheet(content){return'<div class="sheet" style="background:'+T.card+'">'+content+'</div>';}

function buildHTML(c){
  var html="";
  html+=hHeader(c);html+=hTabs();html+=hBackupBanner();
  html+='<div style="padding:13px">';
  if(S.tab==="dashboard")html+=hDashboard(c);
  if(S.tab==="fixkosten")html+=hFixkosten(c);
  if(S.tab==="kategorien")html+=hKategorien(c);
  if(S.tab==="eintraege")html+=hEintraege(c);
  if(S.tab==="auswertung")html+=hAuswertung(c);
  if(S.tab==="settings")html+=hSettings();
  html+='</div>';
  html+=hFABs();html+=hBottomNav();html+=hModals(c);
  return html;
}

function hHeader(c){
  var sc=S.fbStatus==="online"?"#4ade80":"#f87171";
  var st=S.fbStatus==="online"?"Sync aktiv":"Offline";
  var html='<div style="background:'+T.header+';padding:20px 15px 17px;border-bottom:1px solid '+T.cardBorder+'">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
  html+='<div><div style="font-size:10px;letter-spacing:3px;color:#9ca3af;text-transform:uppercase;margin-bottom:3px">Haushaltsbuch</div>';
  html+='<div style="font-size:20px;font-weight:700">Familienfinanzen</div>';
  html+='<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:99px;background:'+sc+'"></div><span style="color:'+sc+'">'+st+'</span></div></div>';
  html+='<div style="display:flex;gap:6px">';
  html+='<select id="selM" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">';
  for(var i=0;i<12;i++)html+='<option value="'+i+'"'+(i===S.fMonth?" selected":"")+'>'+MONTHS[i]+'</option>';
  html+='</select><select id="selY" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:3px 6px;font-size:11px">';
  [2024,2025,2026,2027].forEach(function(y){html+='<option value="'+y+'"'+(y===S.fYear?" selected":"")+'>'+y+'</option>';});
  html+='</select></div></div>';
  var cards=[{l:"Einnahmen",v:c.tInc,col:"#4ade80",key:"einnahmen"},{l:"Fixkosten",v:c.tFix,col:"#a78bfa",key:"fixkosten"},{l:"Variabel",v:c.tVar,col:"#f87171",key:"variabel"},{l:"Bilanz",v:c.bal,col:c.bal>=0?"#60a5fa":"#fb923c",key:"bilanz"}];
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
  cards.forEach(function(x){html+='<button data-headerdetail="'+x.key+'" style="background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 6px;border:1px solid '+x.col+'25;cursor:pointer;text-align:left;width:100%"><div style="font-size:9px;color:#9ca3af;margin-bottom:2px;letter-spacing:1px;pointer-events:none">'+x.l.toUpperCase()+'</div><div style="font-size:12px;font-weight:700;color:'+x.col+';pointer-events:none">'+eur(x.v)+'</div><div style="font-size:8px;color:#6b7280;margin-top:1px;pointer-events:none">Details &#8250;</div></button>';});
  html+='</div></div>';return html;
}

function hTabs(){
  var tabs=[["dashboard","&#128202; Uebersicht"],["fixkosten","&#128204; Fixkosten"],["kategorien","&#128193; Kategorien"],["eintraege","&#128203; Eintraege"],["auswertung","&#128200; Trend"],["settings","&#9881; Einst."]];
  var html='<div style="display:flex;background:'+T.card+';border-bottom:1px solid '+T.cardBorder+';overflow-x:auto">';
  tabs.forEach(function(t){var a=S.tab===t[0];html+='<button data-tab="'+t[0]+'" style="flex:0 0 auto;padding:11px 10px;background:none;border:none;border-bottom:2px solid '+(a?T.accent:"transparent")+';color:'+(a?T.accent:"#6b7280")+';font-size:10px;font-weight:'+(a?700:400)+';cursor:pointer;white-space:nowrap">'+t[1]+'</button>';});
  html+='</div>';return html;
}

function hBackupBanner(){
  var show=!S.data.lastBackup||(Date.now()-S.data.lastBackup)/86400000>=7;
  if(!show)return"";
  return'<div style="margin:10px 13px 0;background:#1e2d1e;border-radius:10px;padding:10px 12px;border:1px solid rgba(74,222,128,0.2);display:flex;align-items:center;gap:9px"><span>&#128190;</span><div style="flex:1"><div style="font-size:12px;font-weight:600;color:#4ade80">Woechentliche Sicherung</div></div><button id="btnBk" style="background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80;border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer">Backup</button><button id="btnBkX" style="background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer">x</button></div>';
}

function hDashboard(c){
  var html=panel('<div style="font-size:12px;font-weight:600;margin-bottom:9px">Fix vs. Variabel - '+MONTHS[S.fMonth]+'</div>'+
    '<div style="display:flex;gap:7px;margin-bottom:'+(c.tExp>0?7:0)+'px">'+
    '<div style="flex:1;background:rgba(167,139,250,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(167,139,250,0.2)"><div style="font-size:10px;color:#9ca3af">FIXKOSTEN</div><div style="font-size:14px;font-weight:700;color:#a78bfa">'+eur(c.tFix)+'</div><div style="font-size:10px;color:#6b7280">'+(c.tExp>0?Math.round(c.tFix/c.tExp*100):0)+'%</div></div>'+
    '<div style="flex:1;background:rgba(248,113,113,0.1);border-radius:9px;padding:9px 10px;border:1px solid rgba(248,113,113,0.2)"><div style="font-size:10px;color:#9ca3af">VARIABEL</div><div style="font-size:14px;font-weight:700;color:#f87171">'+eur(c.tVar)+'</div><div style="font-size:10px;color:#6b7280">'+(c.tExp>0?Math.round(c.tVar/c.tExp*100):0)+'%</div></div></div>'+
    (c.tExp>0?'<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:6px;overflow:hidden;display:flex"><div style="width:'+Math.round(c.tFix/c.tExp*100)+'%;height:100%;background:#a78bfa"></div><div style="width:'+Math.round(c.tVar/c.tExp*100)+'%;height:100%;background:#f87171"></div></div>':""),
    "margin-bottom:13px");
  if(c.tFixInc>0)html+=panel('<div style="font-size:12px;font-weight:600;margin-bottom:4px;color:#4ade80">Wiederkehrende Einnahmen</div><div style="font-size:14px;font-weight:700;color:#4ade80">+'+eur(c.tFixInc)+' / Monat</div>',"margin-bottom:13px;border:1px solid rgba(74,222,128,0.2)!important");
  html+='<div style="font-size:12px;color:#9ca3af;margin-bottom:8px">Budgets - '+MONTHS[S.fMonth]+' '+S.fYear+'</div>';
  S.data.categories.forEach(function(cat){
    var budget=S.data.budgets[cat.id]||0,spent=catExp(cat.id,c),over=budget>0&&spent>budget;
    html+='<div class="panel" style="background:'+T.card+';border:1px solid '+(over?"rgba(248,113,113,0.3)":T.cardBorder)+';padding:0;overflow:hidden">';
    html+='<button data-catdetail="'+cat.id+'" style="width:100%;background:none;border:none;padding:12px 14px;cursor:pointer;text-align:left">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(budget>0?6:0)+'px"><div style="display:flex;align-items:center;gap:7px"><span style="font-size:17px;pointer-events:none">'+ph(cat.icon)+'</span><span style="font-size:12px;font-weight:600;color:#e8e6f0;pointer-events:none">'+h(cat.label)+'</span>'+(over?'<span style="font-size:9px;background:rgba(248,113,113,0.2);color:#f87171;padding:1px 5px;border-radius:20px;pointer-events:none">UEBER</span>':"")+'</div><div style="display:flex;align-items:center;gap:6px;pointer-events:none"><span style="font-size:12px;font-weight:700;color:'+(over?"#f87171":"#e8e6f0")+'">'+eur(spent)+'</span>'+(budget>0?'<span style="font-size:10px;color:#6b7280"> / '+eur(budget)+'</span>':"")+'<span style="font-size:12px;color:#6b7280">&#8250;</span></div></div>';
    if(budget>0)html+='<div style="background:rgba(255,255,255,0.1);border-radius:99px;height:5px;overflow:hidden;pointer-events:none"><div style="width:'+Math.min(spent/budget*100,100)+'%;height:100%;background:'+(over?"#f87171":cat.color)+'"></div></div>';
    html+='</button></div>';
  });
  return html;
}

function editBtns(eid,fid){
  // eid = entry id, fid = fix id (one should be null)
  var html='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:3px">';
  if(eid)html+='<button data-ee="'+eid+'" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:0">&#9998;</button><button data-de="'+eid+'" style="font-size:11px;color:#4b5563;background:none;border:none;cursor:pointer;padding:0">&#128465;</button>';
  if(fid)html+='<button data-ef="'+fid+'" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:0">&#9998;</button><button data-df="'+fid+'" style="font-size:11px;color:#4b5563;background:none;border:none;cursor:pointer;padding:0">&#128465;</button>';
  html+='</div>';return html;
}

function hFixRow(fix,r,fMonth){
  var cat=fix.isIncome?INCOME_CAT:getCat(fix.category);
  var active=fixActive(fix,fMonth);
  var col=fix.isIncome?"#4ade80":"#f87171";
  var sign=fix.isIncome?"+":"-";
  return panel(
    '<div style="display:flex;align-items:center;gap:10px;opacity:'+(active?1:0.5)+'">'+
    '<span style="font-size:18px">'+ph(cat.icon)+'</span>'+
    '<div style="flex:1"><div style="display:flex;align-items:center;gap:5px"><span style="font-size:12px;font-weight:600">'+h(fix.label)+'</span>'+(active?'<span style="font-size:9px;background:rgba(74,222,128,0.1);color:#4ade80;padding:1px 4px;border-radius:9px">AKTIV</span>':"")+'</div>'+
    '<div style="font-size:10px;color:#6b7280">'+(fix.isIncome?"Wiederk. Einnahme":h(cat.label))+' - '+r.label+(fix.person?' - '+h(fix.person):'')+'</div></div>'+
    '<div style="text-align:right;min-width:70px"><div style="font-size:13px;font-weight:700;color:'+col+'">'+sign+eur(fix.amount)+'</div><div style="font-size:9px;color:#6b7280">'+r.short+'</div>'+editBtns(null,fix.id)+'</div></div>');
}

function hFixkosten(c){
  var allFix=S.data.fixkosten;
  var expFix=allFix.filter(function(f){return !f.isIncome;});

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+

function sortEntries(entries){
  var sorted=entries.slice();
  sorted.sort(function(a,b){
    var r=0;
    if(S.sortBy==="datum")r=a.date<b.date?-1:a.date>b.date?1:0;
    else if(S.sortBy==="alpha"){var na=(a.note||getCat(a.category).label).toLowerCase(),nb=(b.note||getCat(b.category).label).toLowerCase();r=na<nb?-1:na>nb?1:0;}
    else if(S.sortBy==="preis")r=a.amount-b.amount;
    return S.sortDir==="desc"?-r:r;
  });
  return sorted;
}

function filterAndSearch(entries){
  return sortEntries(entries.filter(function(e){
    if(S.filterPerson!=="alle"&&e.person!==S.filterPerson)return false;
    if(S.filterType!=="alle"&&e.type!==S.filterType)return false;
    if(S.filterCat!=="alle"&&e.category!==S.filterCat)return false;
    if(S.search){
      var q=S.search.toLowerCase();
      var cat=getCat(e.category);
      var txt=(e.note||"")+" "+(cat.label||"")+" "+e.date+" "+e.person;
      if(txt.toLowerCase().indexOf(q)<0)return false;
    }
    return true;
  }));
}

function deleteEntry(id){
  var entry=S.data.entries.find(function(e){return String(e.id)===String(id);});
  if(entry){if(!S.data.trash)S.data.trash=[];S.data.trash.unshift(Object.assign({},entry,{deletedAt:Date.now()}));S.data.entries=S.data.entries.filter(function(e){return String(e.id)!==String(id);});}
  S.catDetailId=null;S.headerDetail=null;saveData();render();
}

function bind(){
  function on(id,fn){var el=document.getElementById(id);if(el)el.addEventListener("click",fn);}
  function all(sel,fn){document.querySelectorAll(sel).forEach(fn);}
  function onC(id,fn){var el=document.getElementById(id);if(el)el.addEventListener("change",fn);}

  // Search / sort / filter bindings
  var inpSearch=document.getElementById("inpSearch");
  if(inpSearch){
    inpSearch.addEventListener("input",function(){S.search=inpSearch.value;render();});
    // Keep focus and cursor position after render
    inpSearch.focus();
    var len=inpSearch.value.length;try{inpSearch.setSelectionRange(len,len);}catch(e){}
  }
  all("[data-sortby]",function(b){b.addEventListener("click",function(){
    if(S.sortBy===b.dataset.sortby)S.sortDir=S.sortDir==="desc"?"asc":"desc";
    else{S.sortBy=b.dataset.sortby;S.sortDir="desc";}
    render();
  });});
  on("btnToggleDir",function(){S.sortDir=S.sortDir==="desc"?"asc":"desc";render();});
  var selFP=document.getElementById("selFPerson");if(selFP)selFP.addEventListener("change",function(){S.filterPerson=selFP.value;render();});
  var selFT=document.getElementById("selFType");if(selFT)selFT.addEventListener("change",function(){S.filterType=selFT.value;render();});
  var selFC=document.getElementById("selFCat");if(selFC)selFC.addEventListener("change",function(){S.filterCat=selFC.value;render();});
  all("[data-headerdetail]",function(b){b.addEventListener("click",function(){S.headerDetail=b.dataset.headerdetail;render();});});
  all("[data-catdetail]",function(b){b.addEventListener("click",function(){S.catDetailId=b.dataset.catdetail;render();});});
  all("[data-trenddetail]",function(b){b.addEventListener("click",function(){S.trendDetail=+b.dataset.trenddetail;render();});});
  all("[data-trendperson]",function(b){b.addEventListener("click",function(){S.trendPerson=b.dataset.trendperson;render();});});
  all("[data-theme]",function(b){b.addEventListener("click",function(){S.data.theme=b.dataset.theme;saveData();render();});});
  all("[data-restore]",function(b){b.addEventListener("click",function(){var tid=b.dataset.restore;var item=(S.data.trash||[]).find(function(e){return String(e.id)===tid;});if(item){S.data.entries.unshift(Object.assign({},item,{deletedAt:undefined}));S.data.trash=S.data.trash.filter(function(e){return String(e.id)!==tid;});saveData();render();}});});
  all("[data-ausp]",function(b){b.addEventListener("click",function(){S.ausPerson=b.dataset.ausp;render();});});

  all("[data-tab]",function(b){b.addEventListener("click",function(){S.tab=b.dataset.tab;render();});});
  onC("selM",function(){S.fMonth=+document.getElementById("selM").value;render();});
  onC("selY",function(){S.fYear=+document.getElementById("selY").value;render();});

function doBackup(){var content=JSON.stringify({entries:S.data.entries,fixkosten:S.data.fixkosten,categories:S.data.categories,persons:S.data.persons,budgets:S.data.budgets,exportedAt:new Date().toISOString()},null,2);S.expModal={title:"Backup (JSON)",content:content,hint:"Kopiere den Text und speichere ihn als .json Datei."};S.data.lastBackup=Date.now();saveData();render();}
function doCSV(){var sep=";",allCats=S.data.categories.concat([INCOME_CAT]);var hdr=["Datum","Typ","Kategorie","Person","Betrag","Notiz"].join(sep);var eL=S.data.entries.map(function(e){var cat=allCats.find(function(x){return x.id===e.category;});var b=(e.type==="einnahme"?e.amount:-e.amount).toFixed(2).replace(".",",");return[e.date,e.type==="einnahme"?"Einnahme":"Ausgabe",cat?cat.label:e.category,e.person,b,'"'+(e.note||"")+'"'].join(sep);});var fL=S.data.fixkosten.map(function(f){var cat=S.data.categories.find(function(x){return x.id===f.category;});var b=(f.isIncome?f.amount:-f.amount).toFixed(2).replace(".",",");var rh=RHYTHMUS.find(function(r){return r.id===f.rhythmus;});return[f.startDate||"",f.isIncome?"Fixeinnahme":"Fixkosten",cat?cat.label:"",f.person||"",b,'"'+f.label+' ('+(rh?rh.label:"")+')'+'"'].join(sep);});var sH=["Monat","Einnahmen","Variabel","Fixkosten","Gesamt","Bilanz"].join(sep);var sL=MONTHS.map(function(m,i){var me=S.data.entries.filter(function(e){var dt=new Date(e.date);return dt.getMonth()===i&&dt.getFullYear()===S.fYear;});var fM=S.data.fixkosten.filter(function(f){return !f.isIncome&&fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);var fI=S.data.fixkosten.filter(function(f){return f.isIncome&&fixActive(f,i);}).reduce(function(s,f){return s+fixMo(f);},0);var inc=me.filter(function(e){return e.type==="einnahme";}).reduce(function(s,e){return s+e.amount;},0)+fI;var vr=me.filter(function(e){return e.type==="ausgabe";}).reduce(function(s,e){return s+e.amount;},0);return[m+" "+S.fYear,inc.toFixed(2).replace(".",","),vr.toFixed(2).replace(".",","),fM.toFixed(2).replace(".",","),(vr+fM).toFixed(2).replace(".",","),(inc-vr-fM).toFixed(2).replace(".",",")].join(sep);});S.expModal={title:"CSV fuer Excel",content:[hdr].concat(eL).concat(fL).concat(["","=== MONATSUEBERSICHT ===",sH]).concat(sL).join("\n"),hint:"Kopiere -> Excel -> Zelle A1 -> Einfuegen."};render();}
